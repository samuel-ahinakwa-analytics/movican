const fmt      = d => new Date(d).toISOString().split("T")[0];
const addDays  = (ds,n) => { const d=new Date(ds); d.setDate(d.getDate()+n); return fmt(d); };
const addMonths= (ds,n) => { const d=new Date(ds); d.setMonth(d.getMonth()+n); return fmt(d); };
const daysDiff = ds => { const due=new Date(ds); due.setHours(0,0,0,0); const now=new Date(); now.setHours(0,0,0,0); return Math.floor((now-due)/86400000); };

function calcLoan(principal,cycle,instalments){
  const months = cycle==="WEEKLY" ? instalments/4 : instalments;
  const totalInterest = principal*0.05*months;
  const totalDebt = principal+totalInterest;
  const instalmentAmount = totalDebt/instalments;
  return {totalInterest,totalDebt,instalmentAmount,months};
}
function genSchedule(loanId,approvalDate,cycle,instalments,instalmentAmount){
  return Array.from({length:instalments},(_,i)=>({
    id:`SCH-${loanId}-${i+1}`,loanId,instalment:i+1,
    dueDate:cycle==="WEEKLY"?addDays(approvalDate,21+i*7):addMonths(approvalDate,2+i),
    amountDue:instalmentAmount,amountPaid:0,remaining:instalmentAmount,status:"UNPAID",
  }));
}
function overdueband(days){
  if(days<=0)  return null;
  if(days<=7)  return {label:"WATCH",    color:c.accent, action:"Monitor closely"};
  if(days<=14) return {label:"CALL",     color:c.orange, action:"Call the customer now"};
  if(days<=30) return {label:"ESCALATE", color:c.red,    action:"Visit / send written notice"};
  if(days<=90) return {label:"CRITICAL", color:c.purple, action:"Guarantor / legal action"};
  return             {label:"WRITE-OFF", color:"#6B7280",action:"Escalate immediately"};
}

// ── FEATURE 1: CREDIT SCORING ───────────────────────────────────────────────
function calcCreditScore(memberId, loans, schedules){
  const mLoans = loans.filter(l=>l.memberId===memberId);
  if(mLoans.length===0) return {score:50,band:"Fair",color:c.accent,detail:"No loan history"};

  let score = 50; // base

  // Completed loans bonus (+10 each, max 20)
  const paidOff = mLoans.filter(l=>l.status==="PAID_OFF").length;
  score += Math.min(paidOff*10, 20);

  // Active loan repayment behaviour
  const allSchs = schedules.filter(sc=>mLoans.some(l=>l.id===sc.loanId));
  const paidSchs = allSchs.filter(sc=>sc.status==="PAID");
  const overdueSchs = allSchs.filter(sc=>sc.status!=="PAID"&&daysDiff(sc.dueDate)>0);
  const totalSchs = allSchs.length;

  if(totalSchs>0){
    const punctualityRate = paidSchs.length/totalSchs;
    score += Math.round(punctualityRate*30); // up to +30

    const overdueRate = overdueSchs.length/totalSchs;
    score -= Math.round(overdueRate*30); // up to -30
  }

  // Average overdue days penalty
  if(overdueSchs.length>0){
    const avgDays = overdueSchs.reduce((s,sc)=>s+daysDiff(sc.dueDate),0)/overdueSchs.length;
    if(avgDays>30) score-=15;
    else if(avgDays>14) score-=8;
    else if(avgDays>7) score-=4;
  }

  // Loan growth bonus (borrowing more = trusted)
  if(mLoans.length>1){
    const amounts = mLoans.map(l=>l.principalApproved||l.principalRequested).filter(Boolean);
    if(amounts[amounts.length-1]>amounts[0]) score+=5;
  }

  score = Math.max(0,Math.min(100,score));
  let band,color;
  if(score>=80){band="Excellent";color=c.green;}
  else if(score>=60){band="Good";color=c.blue;}
  else if(score>=40){band="Fair";color=c.accent;}
  else{band="Poor";color=c.red;}

  return {score,band,color,detail:`${paidOff} loan(s) completed · ${overdueSchs.length} overdue instalments`};
}

  }catch(e){return{members:[],loans:[],schedules:[],payments:[],branches:DEFAULT_BRANCHES};}
}
function lsSave(db){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify(db));
    localStorage.setItem(LS_KEY+"_backup",JSON.stringify({...db,savedAt:new Date().toISOString()}));
  }catch(e){}
}

function gasGet(){
  return new Promise(resolve=>{
    const cb="cb_"+Math.random().toString(36).slice(2,10);
    const s=document.createElement("script");
    let done=false;
    window[cb]=d=>{done=true;try{document.head.removeChild(s);}catch(e){}delete window[cb];resolve(d);};
    s.src=`${GAS_URL}?action=getAll&callback=${cb}`;
    s.onerror=()=>{if(!done){done=true;delete window[cb];resolve(null);}};
    document.head.appendChild(s);
    setTimeout(()=>{if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){}resolve(null);}},15000);
  });
}
function gasPost(action,data){fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,data})}).catch(()=>{});}

  const openApprove=loan=>{const calc=calcLoan(loan.principalRequested,loan.cycle,loan.instalments);setAppModal({loan,approvedAmount:loan.principalRequested,approvedInstalments:loan.instalments,...calc});};

        </>}
        {aTab==="schedule"&&(()=>{const activeLList=loans.filter(l=>l.status==="ACTIVE");const selLoan=activeLList.find(l=>l.id===schedLoan)||null;const lSchs=selLoan?schedules.filter(sc=>sc.loanId===selLoan.id):[];const tp=lSchs.reduce((s,sc)=>s+sc.amountPaid,0);const tr=lSchs.reduce((s,sc)=>s+sc.remaining,0);const prog=selLoan&&selLoan.totalDebt>0?(tp/selLoan.totalDebt)*100:0;return<><div style={SEC}>View Repayment Schedule</div><div style={FCARD}><label style={LBL}>Select Member</label><select style={{...INP,fontSize:"14px"}} value={schedLoan} onChange={e=>setSchedLoan(e.target.value)}><option value="">-- Choose a member --</option>{activeLList.map(loan=>{const ls=schedules.filter(sc=>sc.loanId===loan.id);const paid=ls.filter(sc=>sc.status==="PAID").length;const ov=ls.filter(sc=>sc.status!=="PAID"&&daysDiff(sc.dueDate)>0).length;return<option key={loan.id} value={loan.id}>{loan.memberName} \u2014 {loan.cycle} \u2014 {paid}/{loan.instalments} paid{ov>0?` \u2014 \u26a0 ${ov} overdue`:""}</option>;})}</select></div>{selLoan&&<div style={CARD}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px",flexWrap:"wrap",gap:"10px"}}><div><div style={{fontWeight:"bold",fontSize:"16px",color:c.text}}>{selLoan.memberName}</div><div style={{fontFamily:"monospace",fontSize:"11px",color:c.muted}}>{selLoan.id} \u00b7 {selLoan.cycle} \u00b7 {selLoan.instalments} instalments</div></div><div style={{display:"flex",gap:"16px",flexWrap:"wrap"}}><div style={{textAlign:"right"}}><div style={{fontSize:"10px",color:c.muted}}>Total</div><div style={{fontFamily:"monospace",fontWeight:"bold"}}>{GHS(selLoan.totalDebt)}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:"10px",color:c.muted}}>Paid</div><div style={{fontFamily:"monospace",color:c.green,fontWeight:"bold"}}>{GHS(tp)}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:"10px",color:c.muted}}>Owed</div><div style={{fontFamily:"monospace",color:c.red,fontWeight:"bold"}}>{GHS(tr)}</div></div></div></div><div style={{background:c.border,borderRadius:"4px",height:"8px",marginBottom:"6px"}}><div style={{background:c.green,height:"8px",borderRadius:"4px",width:`${Math.min(prog,100)}%`,transition:"width 0.4s"}}/></div><div style={{fontSize:"10px",color:c.muted,marginBottom:"16px",fontFamily:"monospace"}}>{prog.toFixed(1)}% repaid</div><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>#</th><th style={TH}>Due Date</th><th style={TH}>Amount Due</th><th style={TH}>Paid</th><th style={TH}>Remaining</th><th style={TH}>Status</th><th style={TH}>Note</th></tr></thead><tbody>{lSchs.map(sc=>{const days=daysDiff(sc.dueDate);const band=sc.status!=="PAID"?overdueband(days):null;return<tr key={sc.id}><td style={{...TD,fontFamily:"monospace",fontWeight:"bold",color:c.accent}}>#{sc.instalment}</td><td style={{...TD,fontFamily:"monospace",fontSize:"11px"}}>{sc.dueDate}</td><td style={{...TD,fontFamily:"monospace"}}>{GHS(sc.amountDue)}</td><td style={{...TD,fontFamily:"monospace",color:c.green}}>{GHS(sc.amountPaid)}</td><td style={{...TD,fontFamily:"monospace",color:sc.remaining>0?c.red:c.green,fontWeight:"bold"}}>{GHS(sc.remaining)}</td><td style={TD}><span style={pill(sc.status)}>{sc.status}</span></td><td style={TD}>{band?<span style={riskBand(band.color)}>{days}d overdue</span>:sc.status==="PAID"?<span style={{color:c.green,fontSize:"11px"}}>✓</span>:<span style={{color:c.muted,fontSize:"11px"}}>Upcoming</span>}</td></tr>;})}</tbody></table></div>}</>;})()}
      </div>}
      <Footer/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
