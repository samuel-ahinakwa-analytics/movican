const TODAY    = new Date();

const addMonths= (ds,n) => { const d=new Date(ds); d.setMonth(d.getMonth()+n); return fmt(d); };

function calcLoan(principal, cycle, instalments) {
  const months = cycle === "WEEKLY" ? instalments/4 : instalments;
  const interest = principal * 0.05 * months;
  const debt = principal + interest;
  return { interest, debt, instAmt: debt/instalments, months };
}

function genSchedule(loanId, approvalDate, cycle, instalments, instAmt) {
  return Array.from({length: instalments}, (_,i) => ({
    id: `SCH-${loanId}-${i+1}`, loanId, instalment: i+1,
    dueDate: cycle==="WEEKLY" ? addDays(approvalDate, 21+i*7) : addMonths(approvalDate, 2+i),
    amountDue: instAmt, amountPaid: 0, remaining: instAmt, status: "UNPAID"
  }));
}

function overdueband(days) {
  if (days<=0)  return null;
  if (days<=7)  return {label:"WATCH",    color:C.gold,   action:"Monitor closely"};
  if (days<=14) return {label:"CALL",     color:C.orange, action:"Call the customer now"};
  if (days<=30) return {label:"ESCALATE", color:C.red,    action:"Visit / send written notice"};
  if (days<=90) return {label:"CRITICAL", color:C.purple, action:"Guarantor / legal action"};
  return              {label:"WRITE-OFF", color:"#6B7280",action:"Escalate immediately"};
}

// FEATURE 1: Credit Scoring
function creditScore(memberId, loans, schedules) {
  const mLoans = loans.filter(l => l.memberId === memberId);
  if (!mLoans.length) return {score:50, band:"Fair", color:C.gold, detail:"No loan history yet"};
  let score = 50;
  const paidOff = mLoans.filter(l => l.status==="PAID_OFF").length;
  score += Math.min(paidOff * 10, 20);
  const allSchs = schedules.filter(sc => mLoans.some(l => l.id===sc.loanId));
  const paid = allSchs.filter(sc => sc.status==="PAID");
  const overdue = allSchs.filter(sc => sc.status!=="PAID" && daysDiff(sc.dueDate)>0);
  if (allSchs.length > 0) {
    score += Math.round((paid.length/allSchs.length)*30);
    score -= Math.round((overdue.length/allSchs.length)*30);
  }
  if (overdue.length > 0) {
    const avg = overdue.reduce((s,sc)=>s+daysDiff(sc.dueDate),0)/overdue.length;
    if (avg>30) score-=15; else if(avg>14) score-=8; else if(avg>7) score-=4;
  }
  if (mLoans.length>1) {
    const amts = mLoans.map(l=>l.principalApproved||l.principalRequested).filter(Boolean);
    if (amts[amts.length-1]>amts[0]) score+=5;
  }
  score = Math.max(0, Math.min(100, score));
  let band, color;
  if (score>=80){band="Excellent";color=C.green;}
  else if(score>=60){band="Good";color=C.blue;}
  else if(score>=40){band="Fair";color=C.gold;}
  else{band="Poor";color=C.red;}
  return {score, band, color, detail:`${paidOff} completed · ${overdue.length} overdue instalments`};
}

}
function lsSave(db) {
  try {

  } catch(e){}
}

function gasGet() {
  return new Promise(resolve => {
    const cb = "cb_"+Math.random().toString(36).slice(2,10);
    const s = document.createElement("script");
    let done = false;
    window[cb] = d => { done=true; try{document.head.removeChild(s);}catch(e){} delete window[cb]; resolve(d); };
    s.src = `${GAS_URL}?action=getAll&callback=${cb}`;
    s.onerror = () => { if(!done){done=true;delete window[cb];resolve(null);} };
    document.head.appendChild(s);
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){}resolve(null);} },15000);
  });
}
function gasPost(action, data) {
  fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,data})}).catch(()=>{});
}
async function loadAll() {
  try {

      const db={members:f.members||[],loans:f.loans||[],schedules:f.schedules||[],payments:f.payments||[],branches:f.branches||DEFAULT_BRANCHES};
      lsSave(db); return db;

  } catch(e){}
  return lsLoad();
}

    const paidAmt = actSchs.reduce((s,sc)=>s+sc.amountPaid,0);
    const owedAmt = actSchs.reduce((s,sc)=>s+sc.remaining,0);
    const prog = actLoan&&actLoan.totalDebt>0?(paidAmt/actLoan.totalDebt)*100:0;
    const nextDue = actSchs.filter(sc=>sc.status!=="PAID").sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate))[0];
    return (
      <div style={{minHeight:"100vh",background:C.bg}}>
        <div style={{background:"linear-gradient(135deg,#0A0F1E 0%,#0F1E3A 100%)",borderBottom:`1px solid ${C.border2}`,padding:"16px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:"16px",fontWeight:"bold",color:C.teal}}>My Movican Account</div><div style={{fontSize:"11px",color:C.muted}}>{mem?.fullName} · {mem?.id}</div></div>
          <button onClick={()=>setRole(null)} style={{background:"transparent",border:`1px solid ${C.line}`,borderRadius:"6px",padding:"5px 12px",color:C.muted,cursor:"pointer",fontSize:"11px",fontFamily:"monospace"}}>LOGOUT</button>
        </div>
        <div style={{padding:"24px 20px",maxWidth:"560px",margin:"0 auto"}}>
          {/* Credit Score */}
          <div style={{...CARD,borderLeft:`4px solid ${cs.color}`,textAlign:"center"}}>
            <div style={{fontSize:"10px",color:C.muted,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"8px"}}>Your Credit Score</div>
            <div style={{fontSize:"52px",fontWeight:"bold",color:cs.color,fontFamily:"monospace",lineHeight:1}}>{cs.score}</div>
            <div style={{fontSize:"18px",color:cs.color,fontWeight:"bold",margin:"6px 0 4px"}}>{cs.band}</div>
            <div style={{fontSize:"11px",color:C.muted}}>{cs.detail}</div>
          </div>
          {/* Active Loan */}
          {actLoan?(
            <div style={CARD}>
              <div style={SEC}>Active Loan — {actLoan.id}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
                {[["Loan Amount",GHS(actLoan.principalApproved),C.text],["Total Debt",GHS(actLoan.totalDebt),C.gold],["Amount Paid",GHS(paidAmt),C.green],["Amount Owed",GHS(owedAmt),C.red]].map(([l,v,col])=>(
                  <div key={l} style={{background:C.bg,borderRadius:"8px",padding:"12px",textAlign:"center"}}>
                    <div style={{fontSize:"10px",color:C.muted,marginBottom:"4px"}}>{l}</div>
                    <div style={{fontFamily:"monospace",fontWeight:"bold",color:col,fontSize:"14px"}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{background:C.line,borderRadius:"4px",height:"8px",marginBottom:"6px"}}><div style={{background:C.green,height:"8px",borderRadius:"4px",width:`${Math.min(prog,100)}%`,transition:"width 0.4s"}}/></div>
              <div style={{fontSize:"11px",color:C.muted,marginBottom:"16px",fontFamily:"monospace"}}>{prog.toFixed(1)}% repaid — {actSchs.filter(sc=>sc.status==="PAID").length}/{actLoan.instalments} instalments</div>
              {nextDue&&(
                <div style={{background:daysDiff(nextDue.dueDate)>0?C.redS:C.greenS,border:`1px solid ${daysDiff(nextDue.dueDate)>0?C.red:C.green}`,borderRadius:"8px",padding:"14px",textAlign:"center"}}>
                  <div style={{fontSize:"11px",color:C.muted,marginBottom:"4px"}}>Next Payment Due</div>
                  <div style={{fontFamily:"monospace",fontWeight:"bold",color:daysDiff(nextDue.dueDate)>0?C.red:C.green,fontSize:"18px"}}>{GHS(nextDue.remaining)}</div>
                  <div style={{fontSize:"12px",color:C.muted,marginTop:"4px"}}>Due: {nextDue.dueDate}{daysDiff(nextDue.dueDate)>0?` — ${daysDiff(nextDue.dueDate)} days overdue`:""}</div>
                </div>
              )}
            </div>
          ):(
            <div style={{...CARD,textAlign:"center",color:C.muted,fontSize:"13px"}}>No active loans at this time.</div>
          )}
          {/* Repayment schedule */}
          {actLoan&&actSchs.length>0&&(
            <div style={CARD}>
              <div style={SEC}>Repayment Schedule</div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr><th style={TH}>#</th><th style={TH}>Due Date</th><th style={TH}>Amount</th><th style={TH}>Status</th></tr></thead>
                <tbody>{actSchs.map(sc=><tr key={sc.id}><td style={{...TD,fontFamily:"monospace",color:C.gold}}>#{sc.instalment}</td><td style={{...TD,fontFamily:"monospace",fontSize:"11px"}}>{sc.dueDate}</td><td style={{...TD,fontFamily:"monospace"}}>{GHS(sc.amountDue)}</td><td style={TD}><span style={pill(sc.status)}>{sc.status}</span></td></tr>)}</tbody>
              </table>
            </div>
          )}
          {/* Loan History */}
          <div style={CARD}>
            <div style={SEC}>Loan History</div>
            {mLoans.length===0?<div style={{color:C.muted,fontSize:"12px"}}>No loan history.</div>:mLoans.map(l=>(
              <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.line}`,flexWrap:"wrap",gap:"6px"}}>
                <span style={{fontFamily:"monospace",color:C.gold,fontSize:"12px"}}>{l.id}</span>
                <span style={{fontSize:"12px"}}>{GHS(l.principalRequested)}</span>
                <span style={{fontSize:"11px",color:C.muted}}>{l.cycle}</span>
                <span style={pill(l.status)}>{l.status}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── ADMIN PORTAL ──────────────────────────────────────────────────────────────
  if (role==="admin") return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {toast&&<div style={{position:"fixed",top:18,right:18,zIndex:2000,background:toast.color,color:"#fff",padding:"11px 18px",borderRadius:"8px",fontSize:"12px",fontFamily:"monospace",boxShadow:"0 4px 20px rgba(0,0,0,0.5)",animation:"fadeIn 0.2s ease"}}>{toast.msg}</div>}
      <Header showBranch={false}/>
      <div style={{display:"flex",gap:"2px",padding:"14px 28px 0",borderBottom:`1px solid ${C.line}`,overflowX:"auto"}}>
        {[["newMember","New Member"],["newLoan","Loan Application"],["logPayment","Log Payment"],["schedule","Schedules"]].map(([k,l])=>(
          <button key={k} onClick={()=>setATab(k)} style={{padding:"9px 14px",border:"none",background:aTab===k?C.blueS:"transparent",color:aTab===k?C.blue:C.muted,borderBottom:aTab===k?`2px solid ${C.blue}`:"2px solid transparent",cursor:"pointer",fontSize:"12px",fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>
      {loading&&<Spin/>}
      {!loading&&<div style={{padding:"24px 28px",maxWidth:"900px"}}>

        {aTab==="newMember"&&<>
          <div style={SEC}>Register New Member</div>
          <div style={FC}>
            <div style={{...SEC,color:C.blue}}>Customer Information</div>
            <div style={G2}><div><label style={LBL}>Full Legal Name *</label><input style={INP} value={mForm.fullName} onChange={e=>setMForm(p=>({...p,fullName:e.target.value}))} placeholder="As on Ghana Card"/></div><div><label style={LBL}>Telephone *</label><input style={INP} value={mForm.phone} onChange={e=>setMForm(p=>({...p,phone:e.target.value}))}/></div></div>
            <div style={G3}><div><label style={LBL}>Gender</label><select style={INP} value={mForm.gender} onChange={e=>setMForm(p=>({...p,gender:e.target.value}))}><option value="">Select</option><option>Male</option><option>Female</option></select></div><div><label style={LBL}>Marital Status</label><select style={INP} value={mForm.maritalStatus} onChange={e=>setMForm(p=>({...p,maritalStatus:e.target.value}))}><option value="">Select</option><option>Single</option><option>Married</option><option>Divorced</option><option>Widowed</option></select></div><div><label style={LBL}>Date of Birth</label><input style={INP} type="date" value={mForm.dob} onChange={e=>setMForm(p=>({...p,dob:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Residential Address</label><input style={INP} value={mForm.residentialAddress} onChange={e=>setMForm(p=>({...p,residentialAddress:e.target.value}))}/></div><div><label style={LBL}>Home Town</label><input style={INP} value={mForm.homeTown} onChange={e=>setMForm(p=>({...p,homeTown:e.target.value}))}/></div></div>
            <div style={G3}><div><label style={LBL}>Dependents</label><input style={INP} type="number" value={mForm.dependents} onChange={e=>setMForm(p=>({...p,dependents:e.target.value}))}/></div><div><label style={LBL}>Ghana Card No.</label><input style={INP} value={mForm.ghanaCard} onChange={e=>setMForm(p=>({...p,ghanaCard:e.target.value}))} placeholder="GHA-XXXXXXXXX-X"/></div><div><label style={LBL}>Digital Address</label><input style={INP} value={mForm.digitalAddress} onChange={e=>setMForm(p=>({...p,digitalAddress:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Type of Business</label><input style={INP} value={mForm.typeOfBusiness} onChange={e=>setMForm(p=>({...p,typeOfBusiness:e.target.value}))}/></div><div><label style={LBL}>Business Location</label><input style={INP} value={mForm.businessLocation} onChange={e=>setMForm(p=>({...p,businessLocation:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Place of Worship</label><input style={INP} value={mForm.placeOfWorship} onChange={e=>setMForm(p=>({...p,placeOfWorship:e.target.value}))}/></div><div><label style={LBL}>Worship Location</label><input style={INP} value={mForm.worshipLocation} onChange={e=>setMForm(p=>({...p,worshipLocation:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Branch *</label><select style={INP} value={mForm.branch} onChange={e=>setMForm(p=>({...p,branch:e.target.value}))}>{branches.map(b=><option key={b} value={b}>{b}</option>)}</select></div><div><label style={LBL}>Alternate MoMo</label><input style={INP} value={mForm.alternateMomo} onChange={e=>setMForm(p=>({...p,alternateMomo:e.target.value}))} placeholder="For third-party payments"/></div></div>
          </div>
          <div style={FC}>
            <div style={{...SEC,color:C.orange}}>Guarantor Information</div>
            <div style={G2}><div><label style={LBL}>Guarantor Full Name</label><input style={INP} value={gForm.name} onChange={e=>setGForm(p=>({...p,name:e.target.value}))}/></div><div><label style={LBL}>Relationship</label><input style={INP} value={gForm.relationship} onChange={e=>setGForm(p=>({...p,relationship:e.target.value}))} placeholder="e.g. Friend, Spouse"/></div></div>
            <div style={G3}><div><label style={LBL}>Gender</label><select style={INP} value={gForm.gender} onChange={e=>setGForm(p=>({...p,gender:e.target.value}))}><option value="">Select</option><option>Male</option><option>Female</option></select></div><div><label style={LBL}>Marital Status</label><select style={INP} value={gForm.maritalStatus} onChange={e=>setGForm(p=>({...p,maritalStatus:e.target.value}))}><option value="">Select</option><option>Single</option><option>Married</option><option>Divorced</option><option>Widowed</option></select></div><div><label style={LBL}>Date of Birth</label><input style={INP} type="date" value={gForm.dob} onChange={e=>setGForm(p=>({...p,dob:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Phone</label><input style={INP} value={gForm.phone} onChange={e=>setGForm(p=>({...p,phone:e.target.value}))}/></div><div><label style={LBL}>Dependents</label><input style={INP} type="number" value={gForm.dependents} onChange={e=>setGForm(p=>({...p,dependents:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Residential Address</label><input style={INP} value={gForm.residentialAddress} onChange={e=>setGForm(p=>({...p,residentialAddress:e.target.value}))}/></div><div><label style={LBL}>Home Town</label><input style={INP} value={gForm.homeTown} onChange={e=>setGForm(p=>({...p,homeTown:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Occupation / Business</label><input style={INP} value={gForm.occupation} onChange={e=>setGForm(p=>({...p,occupation:e.target.value}))}/></div><div><label style={LBL}>Business Location</label><input style={INP} value={gForm.businessLocation} onChange={e=>setGForm(p=>({...p,businessLocation:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Place of Worship</label><input style={INP} value={gForm.placeOfWorship} onChange={e=>setGForm(p=>({...p,placeOfWorship:e.target.value}))}/></div><div><label style={LBL}>Worship Location</label><input style={INP} value={gForm.worshipLocation} onChange={e=>setGForm(p=>({...p,worshipLocation:e.target.value}))}/></div></div>
          </div>
          <button disabled={syncing} onClick={submitMember} style={{background:syncing?C.muted:C.blue,color:"#fff",border:"none",borderRadius:"8px",padding:"12px 24px",cursor:syncing?"not-allowed":"pointer",fontWeight:"bold",fontSize:"14px",width:"100%",fontFamily:"Georgia,serif"}}>{syncing?"Saving...":"REGISTER MEMBER"}</button>
        </>}

        {aTab==="newLoan"&&<>
          <div style={SEC}>Loan Application Form</div>
          <div style={FC}>
            <div style={{marginBottom:"14px"}}>
              <label style={LBL}>Select Member *</label>
              <select style={INP} value={lForm.memberId} onChange={e=>setLForm(p=>({...p,memberId:e.target.value}))}>
                <option value="">-- Select registered member --</option>
                {members.map(m=>{ const hasActive=loans.some(l=>l.memberId===m.id&&l.status==="ACTIVE"); const cs=creditScore(m.id,loans,schedules); return <option key={m.id} value={m.id}>{m.id} — {m.fullName} [{cs.band} {cs.score}]{hasActive?" HAS ACTIVE LOAN":""}</option>; })}
              </select>
            </div>
            {lForm.memberId&&(()=>{ const cs=creditScore(lForm.memberId,loans,schedules); return <div style={{padding:"10px 14px",background:`${cs.color}11`,border:`1px solid ${cs.color}33`,borderRadius:"8px",marginBottom:"14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:"12px",color:C.muted}}>Credit Score</span><ScoreBadge score={cs.score} band={cs.band} color={cs.color}/></div>; })()}
            <div style={G2}><div><label style={LBL}>Loan Amount (GHS) *</label><input style={INP} type="number" value={lForm.principalRequested} onChange={e=>setLForm(p=>({...p,principalRequested:e.target.value}))}/></div><div><label style={LBL}>Previous Loan Amount</label><input style={INP} value={lForm.previousLoanAmount} onChange={e=>setLForm(p=>({...p,previousLoanAmount:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Repayment Cycle *</label><select style={INP} value={lForm.cycle} onChange={e=>setLForm(p=>({...p,cycle:e.target.value}))}><option value="WEEKLY">Weekly</option><option value="MONTHLY">Monthly</option></select></div><div><label style={LBL}>Number of Instalments *</label><input style={INP} type="number" min="1" value={lForm.instalments} onChange={e=>setLForm(p=>({...p,instalments:e.target.value}))}/></div></div>
            {lForm.principalRequested&&lForm.instalments&&Number(lForm.instalments)>0&&(()=>{ const calc=calcLoan(Number(lForm.principalRequested),lForm.cycle,Number(lForm.instalments)); return <div style={{padding:"12px",background:C.greenS,borderRadius:"8px",marginBottom:"14px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px"}}><div><div style={{fontSize:"10px",color:C.muted}}>Interest</div><div style={{fontFamily:"monospace",color:C.gold,fontWeight:"bold"}}>{GHS(calc.interest)}</div></div><div><div style={{fontSize:"10px",color:C.muted}}>Total Debt</div><div style={{fontFamily:"monospace",color:C.green,fontWeight:"bold"}}>{GHS(calc.debt)}</div></div><div><div style={{fontSize:"10px",color:C.muted}}>Per Instalment</div><div style={{fontFamily:"monospace",color:C.text,fontWeight:"bold"}}>{GHS(calc.instAmt)}</div></div></div>; })()}
            <div style={G2}><div><label style={LBL}>Purpose of Loan</label><input style={INP} value={lForm.purposeOfLoan} onChange={e=>setLForm(p=>({...p,purposeOfLoan:e.target.value}))}/></div><div><label style={LBL}>Source of Repayment</label><input style={INP} value={lForm.primarySourceOfRepayment} onChange={e=>setLForm(p=>({...p,primarySourceOfRepayment:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Branch</label><select style={INP} value={lForm.branch} onChange={e=>setLForm(p=>({...p,branch:e.target.value}))}>{branches.map(b=><option key={b} value={b}>{b}</option>)}</select></div><div><label style={LBL}>Submission Date</label><input style={INP} type="date" value={lForm.submissionDate} onChange={e=>setLForm(p=>({...p,submissionDate:e.target.value}))}/></div></div>
          </div>
          <button disabled={syncing} onClick={submitLoan} style={{background:syncing?C.muted:C.green,color:"#fff",border:"none",borderRadius:"8px",padding:"12px 24px",cursor:syncing?"not-allowed":"pointer",fontWeight:"bold",fontSize:"14px",width:"100%",fontFamily:"Georgia,serif"}}>{syncing?"Saving...":"SUBMIT TO DIRECTOR FOR APPROVAL"}</button>
          <div style={{marginTop:"24px"}}>
            <div style={SEC}>All Loan Applications</div>
            <div style={CARD}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>ID</th><th style={TH}>Member</th><th style={TH}>Requested</th><th style={TH}>Approved</th><th style={TH}>Cycle</th><th style={TH}>Status</th><th style={TH}>Action</th></tr></thead>
            <tbody>{loans.map(l=><tr key={l.id}><td style={{...TD,fontFamily:"monospace",color:C.gold}}>{l.id}</td><td style={TD}>{l.memberName}</td><td style={{...TD,fontFamily:"monospace",color:C.muted,fontSize:"11px"}}>{GHS(l.principalRequested)}</td><td style={{...TD,fontFamily:"monospace",color:l.principalApproved?C.green:C.muted}}>{l.principalApproved?GHS(l.principalApproved):"Pending"}</td><td style={TD}>{l.cycle}</td><td style={TD}><span style={pill(l.status)}>{l.status}</span></td>
            <td style={TD}>{l.status==="APPROVED"&&<button disabled={syncing} onClick={()=>markDisbursed(l)} style={{background:syncing?C.muted:C.blue,color:"#fff",border:"none",borderRadius:"6px",padding:"6px 12px",cursor:syncing?"not-allowed":"pointer",fontWeight:"bold",fontSize:"11px",fontFamily:"Georgia,serif"}}>MARK DISBURSED</button>}{l.status==="PENDING"&&<span style={{color:C.gold,fontSize:"11px"}}>Awaiting Director</span>}{l.status==="ACTIVE"&&<span style={{color:C.green,fontSize:"11px"}}>Active</span>}{l.status==="REJECTED"&&<span style={{color:C.red,fontSize:"11px"}}>Rejected</span>}{l.status==="PAID_OFF"&&<span style={{color:C.muted,fontSize:"11px"}}>Paid Off</span>}</td></tr>)}</tbody></table></div>
          </div>
        </>}

        {aTab==="logPayment"&&<>
          <div style={SEC}>Log Incoming Payment</div>
          <div style={FC}>
            <div style={{marginBottom:"14px"}}>
              <label style={LBL}>Select Member Instalment *</label>
              <select style={INP} value={pForm.scheduleId} onChange={e=>setPForm(p=>({...p,scheduleId:e.target.value}))}>
                <option value="">-- Choose member and instalment --</option>
                {loans.filter(l=>l.status==="ACTIVE").map(loan=>{ const lschs=activeSchs.filter(sc=>sc.loanId===loan.id); return lschs.length>0?<optgroup key={loan.id} label={`${loan.memberName} (${loan.id} · ${loan.cycle})`}>{lschs.map(sc=><option key={sc.id} value={sc.id}>Instalment {sc.instalment} — Due: {sc.dueDate} — Owed: GHS {sc.remaining.toFixed(2)}</option>)}</optgroup>:null; })}
              </select>
            </div>
            <div style={G2}><div><label style={LBL}>Amount Paid (GHS) *</label><input style={INP} type="number" value={pForm.amount} onChange={e=>setPForm(p=>({...p,amount:e.target.value}))}/></div><div><label style={LBL}>Payment Method</label><select style={INP} value={pForm.method} onChange={e=>setPForm(p=>({...p,method:e.target.value}))}><option value="CASH">Cash</option><option value="MOMO">Mobile Money (MoMo)</option></select></div></div>
            <div style={G2}><div><label style={LBL}>Receipt / Transaction ID</label><input style={INP} value={pForm.receipt} onChange={e=>setPForm(p=>({...p,receipt:e.target.value}))}/></div><div><label style={LBL}>Sender Phone (if different)</label><input style={INP} value={pForm.senderPhone} onChange={e=>setPForm(p=>({...p,senderPhone:e.target.value}))}/></div></div>
          </div>
          <button disabled={syncing} onClick={submitPayment} style={{background:syncing?C.muted:C.gold,color:"#000",border:"none",borderRadius:"8px",padding:"12px 24px",cursor:syncing?"not-allowed":"pointer",fontWeight:"bold",fontSize:"14px",width:"100%",fontFamily:"Georgia,serif"}}>{syncing?"Saving...":"LOG PAYMENT"}</button>
          <div style={{marginTop:"24px"}}>
            <div style={SEC}>Recent Payments</div>
            <div style={CARD}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>Receipt</th><th style={TH}>Member</th><th style={TH}>Amount</th><th style={TH}>Method</th><th style={TH}>Date</th></tr></thead>
            <tbody>{[...payments].reverse().slice(0,20).map(p=><tr key={p.id}><td style={{...TD,fontFamily:"monospace",color:C.gold}}>{p.receipt}</td><td style={TD}>{p.memberName}</td><td style={{...TD,fontFamily:"monospace",color:C.green}}>{GHS(p.amount)}</td><td style={TD}><span style={{background:p.method==="MOMO"?C.blueS:C.goldS,color:p.method==="MOMO"?C.blue:C.gold,padding:"2px 8px",borderRadius:"10px",fontSize:"10px",fontFamily:"monospace"}}>{p.method}</span></td><td style={{...TD,fontFamily:"monospace",fontSize:"11px"}}>{p.date}</td></tr>)}</tbody></table></div>
          </div>
        </>}

        {aTab==="schedule"&&(()=>{
          const actLL=loans.filter(l=>l.status==="ACTIVE");
          const selL=actLL.find(l=>l.id===schedLoan)||null;
          const lschs=selL?schedules.filter(sc=>sc.loanId===selL.id):[];
          const tp=lschs.reduce((s,sc)=>s+sc.amountPaid,0);
          const tr=lschs.reduce((s,sc)=>s+sc.remaining,0);
          const prg=selL&&selL.totalDebt>0?(tp/selL.totalDebt)*100:0;
          return <>
            <div style={SEC}>View Repayment Schedule</div>
            <div style={FC}>
              <label style={LBL}>Select Member</label>
              <select style={{...INP,fontSize:"14px"}} value={schedLoan} onChange={e=>setSchedLoan(e.target.value)}>
                <option value="">-- Choose a member --</option>
                {actLL.map(loan=>{ const ls=schedules.filter(sc=>sc.loanId===loan.id); const paid=ls.filter(sc=>sc.status==="PAID").length; const ov=ls.filter(sc=>sc.status!=="PAID"&&daysDiff(sc.dueDate)>0).length; return <option key={loan.id} value={loan.id}>{loan.memberName} — {loan.cycle} — {paid}/{loan.instalments} paid{ov>0?` — ${ov} overdue`:""}</option>; })}
              </select>
            </div>

  // ── DIRECTOR PORTAL ───────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:C.bg}}>

          <button key={k} onClick={()=>setTab(k)} style={{padding:"9px 18px",border:"none",background:tab===k?C.goldS:"transparent",color:tab===k?C.gold:C.muted,borderBottom:tab===k?`2px solid ${C.gold}`:"2px solid transparent",cursor:"pointer",fontSize:"13px",fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>
      {loading&&<Spin/>}
      {!loading&&<div style={{padding:"24px 28px",maxWidth:"1280px"}}>

        {tab==="dashboard"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"8px"}}>

          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px",marginBottom:"20px"}}>
            {[[C.gold,todayM.length,"New Members"],[C.orange,pending.length,"Pending Approval"],[C.blue,GHS(todayOut),"Disbursed Today"],[C.green,GHS(todayIn),"Collected Today"]].map(([ac,val,label])=>(
              <div key={label} style={SC(ac)}><div style={{fontSize:typeof val==="number"?"28px":"17px",fontWeight:"bold",color:C.text,lineHeight:1.2,fontFamily:"monospace"}}>{val}</div><div style={{fontSize:"10px",color:C.muted,textTransform:"uppercase",letterSpacing:"1.5px",marginTop:"4px"}}>{label}</div></div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"20px"}}>
            <div style={{...CARD,borderLeft:`4px solid ${C.red}`,background:overdueList.length>0?"rgba(239,68,68,0.06)":C.card,marginBottom:0}}>
              <div style={{fontSize:"11px",color:C.red,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"4px"}}>Portfolio at Risk</div>
              <div style={{fontSize:"32px",fontFamily:"monospace",color:overdueList.length>0?C.red:C.muted,fontWeight:"bold"}}>{GHS(par)}</div>

            </div>
            <div style={{...SC(Number(parRatio)>10?C.red:Number(parRatio)>5?C.orange:C.green),marginBottom:0}}>
              <div style={{fontSize:"11px",color:C.muted,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"4px"}}>PAR Ratio</div>
              <div style={{fontSize:"32px",fontFamily:"monospace",color:Number(parRatio)>10?C.red:Number(parRatio)>5?C.orange:C.green,fontWeight:"bold"}}>{parRatio}%</div>
              <div style={{fontSize:"11px",color:C.muted,marginTop:"4px"}}>Industry benchmark: below 5%</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px",marginBottom:"20px"}}>
            <div style={{...CARD,marginBottom:0}}>
              <div style={SEC}>New Members Today</div>
              {todayM.length===0?<div style={{color:C.muted,fontSize:"12px"}}>No new members today.</div>:
              <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>ID</th><th style={TH}>Name</th><th style={TH}>Branch</th></tr></thead>
              <tbody>{todayM.map(m=><tr key={m.id}><td style={{...TD,fontFamily:"monospace",color:C.gold}}>{m.id}</td><td style={TD}>{m.fullName}</td><td style={TD}><span style={{background:C.blueS,color:C.blue,borderRadius:"8px",padding:"2px 8px",fontSize:"10px",fontFamily:"monospace"}}>{m.branch}</span></td></tr>)}</tbody></table>}
            </div>
            <div style={{...CARD,marginBottom:0}}>
              <div style={SEC}>Loans Awaiting Approval</div>
              {pending.length===0?<div style={{color:C.muted,fontSize:"12px"}}>No pending loans.</div>:

            </div>
          </div>
          <div style={CARD}>
            <div style={SEC}>Overdue — Action Required</div>
            {overdueList.length===0?<div style={{color:C.green,fontSize:"12px"}}>No overdue payments.</div>:

            ))}
          </div>
          <div style={CARD}>
            <div style={SEC}>Performance by Branch</div>

            </table>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px"}}>
            <div style={{...CARD,marginBottom:0}}>
              <div style={SEC}>Loan Status Breakdown</div>
              {["PENDING","APPROVED","ACTIVE","REJECTED","PAID_OFF"].map(st=>{ const count=fLoans.filter(l=>l.status===st).length; const total=fLoans.filter(l=>l.status===st).reduce((s,l)=>s+(l.principalApproved||l.principalRequested||0),0); return <div key={st} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.line}`}}><span style={pill(st)}>{st}</span><div style={{textAlign:"right"}}><div style={{fontFamily:"monospace",fontSize:"13px"}}>{count} loan{count!==1?"s":""}</div><div style={{fontFamily:"monospace",fontSize:"11px",color:C.muted}}>{GHS(total)}</div></div></div>; })}
            </div>
            <div style={{...CARD,marginBottom:0}}>
              <div style={SEC}>Cash Flow</div>
              <div style={{marginBottom:"14px"}}><div style={{fontSize:"10px",color:C.muted,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Money Out</div><div style={{fontSize:"22px",fontFamily:"monospace",color:C.red}}>- {GHS(mOut)}</div></div>
              <div style={{marginBottom:"14px"}}><div style={{fontSize:"10px",color:C.muted,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Money In</div><div style={{fontSize:"22px",fontFamily:"monospace",color:C.green}}>+ {GHS(mIn)}</div></div>
              <div style={{borderTop:`2px solid ${C.gold}`,paddingTop:"14px"}}><div style={{fontSize:"10px",color:C.gold,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Net Position</div><div style={{fontSize:"26px",fontFamily:"monospace",fontWeight:"bold",color:mIn-mOut>=0?C.green:C.red}}>{mIn-mOut>=0?"+":""}{GHS(mIn-mOut)}</div></div>
            </div>
          </div>
        </>}

        {tab==="officers"&&<>
          <div style={SEC}>Loan Officer Performance</div>
          {officerStats.length===0?<div style={{...CARD,color:C.muted,fontSize:"13px",textAlign:"center",padding:"40px"}}>No officer data yet. Loan applications are automatically tagged to the Admin who submitted them.</div>:
          <div style={CARD}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><th style={TH}>Officer</th><th style={TH}>Submitted</th><th style={TH}>Approved</th><th style={TH}>Rate</th><th style={TH}>Active</th><th style={TH}>Paid Off</th><th style={TH}>Overdue</th><th style={TH}>Total Disbursed</th></tr></thead>
              <tbody>{officerStats.map(o=>{ const rate=o.submitted>0?((o.approved/o.submitted)*100).toFixed(0):0; const flag=o.overdue>2; return <tr key={o.name}><td style={{...TD,fontWeight:"bold",color:C.teal}}>{o.name}</td><td style={{...TD,fontFamily:"monospace"}}>{o.submitted}</td><td style={{...TD,fontFamily:"monospace"}}>{o.approved}</td><td style={TD}><span style={{color:Number(rate)>=80?C.green:Number(rate)>=60?C.gold:C.red,fontFamily:"monospace",fontWeight:"bold"}}>{rate}%</span></td><td style={{...TD,fontFamily:"monospace",color:C.blue}}>{o.active}</td><td style={{...TD,fontFamily:"monospace",color:C.green}}>{o.paidOff}</td><td style={TD}><span style={{color:flag?C.red:C.muted,fontFamily:"monospace",fontWeight:"bold"}}>{o.overdue}{flag?" ⚠":""}</span></td><td style={{...TD,fontFamily:"monospace",color:C.gold}}>{GHS(o.disbursed)}</td></tr>; })}</tbody>

          </div>

        {tab==="loans"&&<>
          <div style={SEC}>All Loans</div>
          {rejected.length>0&&<div style={{...CARD,borderLeft:`4px solid ${C.red}`,background:"rgba(239,68,68,0.04)",marginBottom:"16px"}}>
            <div style={{fontSize:"11px",color:C.red,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"10px"}}>Rejection History</div>
            {rejected.map(l=><div key={l.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.line}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{fontFamily:"monospace",fontSize:"12px",color:C.gold}}>{l.id}</span><span style={{fontFamily:"monospace",fontSize:"11px",color:C.muted}}>{l.memberName} · {l.rejectionDate}</span></div><div style={{fontSize:"12px",color:C.muted,fontStyle:"italic"}}>"{l.rejectionReason}"</div></div>)}
          </div>}
          <div style={CARD}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><th style={TH}>ID</th><th style={TH}>Member</th><th style={TH}>Branch</th><th style={TH}>Officer</th><th style={TH}>Score</th><th style={TH}>Approved</th><th style={TH}>Status</th><th style={TH}>Action</th></tr></thead>
              <tbody>{fLoans.map(l=>{ const cs=creditScore(l.memberId,loans,schedules); return <tr key={l.id}><td style={{...TD,fontFamily:"monospace",color:C.gold}}>{l.id}</td><td style={TD}>{l.memberName}</td><td style={{...TD,fontSize:"11px",color:C.blue}}>{l.branch}</td><td style={{...TD,fontSize:"11px",color:C.teal}}>{l.officer||"—"}</td><td style={TD}><ScoreBadge score={cs.score} band={cs.band} color={cs.color}/></td><td style={{...TD,fontFamily:"monospace"}}>{l.principalApproved?GHS(l.principalApproved):"—"}</td><td style={TD}><span style={pill(l.status)}>{l.status}</span></td><td style={TD}>{l.status==="PENDING"&&<><button onClick={()=>openApprove(l)} style={{background:C.gold,color:"#000",border:"none",borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontWeight:"bold",fontSize:"11px",marginRight:"6px"}}>APPROVE</button><button onClick={()=>openReject(l)} style={{background:C.redS,color:C.red,border:`1px solid ${C.red}`,borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontWeight:"bold",fontSize:"11px"}}>REJECT</button></>}{l.status==="APPROVED"&&<span style={{color:C.muted,fontSize:"11px",fontStyle:"italic"}}>Awaiting disbursement</span>}{(l.status==="ACTIVE"||l.status==="PAID_OFF")&&<span style={{color:C.muted,fontSize:"11px"}}>—</span>}</td></tr>; })}</tbody>
            </table>
          </div>
        </>}

        {tab==="members"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"10px"}}>
            <div style={SEC}>Member Register — {filtM.length} Member{filtM.length!==1?"s":""}</div>
            <input style={{...INP,width:"240px",fontSize:"12px"}} placeholder="Search name, phone or ID..." value={search} onChange={e=>setSearch(e.target.value)}/>

                    <div key={label} style={{display:"flex",gap:"8px",marginBottom:"4px",fontSize:"12px"}}><span style={{color:C.muted,minWidth:"90px"}}>{label}</span><span style={{color:C.text}}>{val}</span></div>
                  ))}
                  <div style={{marginTop:"14px",fontSize:"11px",color:C.muted,letterSpacing:"1px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"8px"}}>Loan History</div>
                  {mLoans.map(l=>(
                    <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.line}`,fontSize:"12px",flexWrap:"wrap",gap:"4px"}}>
                      <span style={{fontFamily:"monospace",color:C.gold}}>{l.id}</span>
                      <span>{GHS(l.principalRequested)}</span>
                      <span style={pill(l.status)}>{l.status}</span>
                    </div>
                  ))}
                </div>
              </div>}
            </div>;
          })}
        </>}

      </div>}
      <Footer/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
