// ── Helpers ──────────────────────────────────────────────────────────────────
const TODAY = new Date();
const todayStr = TODAY.toISOString().split("T")[0];
const fmt = d => new Date(d).toISOString().split("T")[0];
const addDays = (ds,n) => { const d=new Date(ds);d.setDate(d.getDate()+n);return fmt(d); };
const addMonths = (ds,n) => { const d=new Date(ds);d.setMonth(d.getMonth()+n);return fmt(d); };
const daysDiff = ds => { const due=new Date(ds);due.setHours(0,0,0,0);const now=new Date();now.setHours(0,0,0,0);return Math.floor((now-due)/86400000); };
const GHS = n => `GHS ${(n||0).toLocaleString(undefined,{minimumFractionDigits:2})}`;
const uid = () => Math.random().toString(36).slice(2,8).toUpperCase();

function calcLoan(principal,cycle,instalments){
  const months = cycle==="WEEKLY" ? instalments/4 : instalments;
  const totalInterest = principal*0.05*months;
  const totalDebt = principal+totalInterest;
  const instalmentAmount = totalDebt/instalments;
  return {totalInterest,totalDebt,instalmentAmount,months};
}
function genSchedule(loanId,approvalDate,cycle,instalments,instalmentAmount){
  return Array.from({length:instalments},(_,i)=>({
    id:`SCH-${loanId}-${i+1}`,loanId,instalment:i+1,
    dueDate:cycle==="WEEKLY"?addDays(approvalDate,21+i*7):addMonths(approvalDate,2+i),
    amountDue:instalmentAmount,amountPaid:0,remaining:instalmentAmount,status:"UNPAID",
  }));
}
function overdueband(days){
  if(days<=0)  return null;
  if(days<=7)  return {label:"WATCH",    color:c.accent, action:"Monitor closely"};
  if(days<=14) return {label:"CALL",     color:c.orange, action:"Call the customer now"};
  if(days<=30) return {label:"ESCALATE", color:c.red,    action:"Visit / send written notice"};
  if(days<=90) return {label:"CRITICAL", color:c.purple, action:"Guarantor / legal action"};
  return             {label:"WRITE-OFF", color:"#6B7280",action:"Escalate immediately"};
}

// ── Database — Google Apps Script via no-cors POST ───────────────────────────
// We use the Apps Script as backend. POST saves data. GET loads via script tag.
const GAS = "https://script.google.com/macros/s/AKfycbxmw9p3x45554Lvl8-VgAKSJ8-YpS3n3979N8OVr3wsx7E2nZlh_daj8jAZwhLQ-mD4KA/exec";

// Save to Google Sheets via no-cors POST (fire and forget)
function gasPost(action, data){
  return fetch(GAS, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify({action, data})
  }).then(()=>({success:true})).catch(()=>({success:true}));
}

// Load data via JSONP script tag (bypasses CORS on GET)
function gasGet(){
  return new Promise((resolve)=>{
    const cb = "cb_"+Math.random().toString(36).slice(2,10);
    const s  = document.createElement("script");
    let done = false;
    window[cb] = (d)=>{
      done = true;
      try{document.head.removeChild(s);}catch(e){}
      delete window[cb];
      resolve(d);
    };
    s.src = `${GAS}?action=getAll&callback=${cb}`;
    s.onerror = ()=>{ if(!done){ done=true; delete window[cb]; resolve({members:[],loans:[],schedules:[],payments:[]}); } };
    document.head.appendChild(s);
    setTimeout(()=>{ if(!done){ done=true; delete window[cb]; try{document.head.removeChild(s);}catch(e){} resolve({members:[],loans:[],schedules:[],payments:[]}); } }, 15000);
  });
}

// localStorage cache — keeps data visible instantly while GAS syncs
const LS = "movican_db_v2";
function lsLoad(){ try{ const r=localStorage.getItem(LS); return r?JSON.parse(r):{members:[],loans:[],schedules:[],payments:[]}; }catch(e){ return {members:[],loans:[],schedules:[],payments:[]}; } }
function lsSave(db){ try{ localStorage.setItem(LS, JSON.stringify(db)); }catch(e){} }

async function apiGet(action){
  // First return localStorage instantly for speed
  const cached = lsLoad();
  // Then try to get fresh data from GAS in background
  try {
    const fresh = await gasGet();
    if(fresh && (fresh.members||fresh.loans)){
      lsSave(fresh);
      return fresh;
    }
  } catch(e){}
  return cached;
}

function apiPost(action, data){
  // 1. Update localStorage immediately (instant UI update)
  const db = lsLoad();
  if(action==="saveMember"){
    db.members = db.members.filter(m=>m.member_id!==data.id);
    const g=data.guarantor||{};
    db.members.push({
      member_id:data.id, full_name:data.fullName, phone:data.phone,
      gender:data.gender, marital_status:data.maritalStatus, dob:data.dob,
      residential_address:data.residentialAddress, home_town:data.homeTown,
      dependents:data.dependents, type_of_business:data.typeOfBusiness,
      business_location:data.businessLocation, place_of_worship:data.placeOfWorship,
      worship_location:data.worshipLocation, ghana_card:data.ghanaCard,
      digital_address:data.digitalAddress, alternate_momo:data.alternateMomo,
      join_date:data.joinDate,
      guarantor_name:g.name||"", guarantor_relationship:g.relationship||"",
      guarantor_gender:g.gender||"", guarantor_marital_status:g.maritalStatus||"",
      guarantor_dob:g.dob||"", guarantor_phone:g.phone||"",
      guarantor_residential_address:g.residentialAddress||"",
      guarantor_home_town:g.homeTown||"", guarantor_dependents:g.dependents||"",
      guarantor_occupation:g.occupation||"",
      guarantor_business_location:g.businessLocation||"",
      guarantor_place_of_worship:g.placeOfWorship||"",
      guarantor_worship_location:g.worshipLocation||""
    });
  } else if(action==="saveLoan"){
    db.loans = db.loans.filter(l=>l.loan_id!==data.id);
    db.loans.push({
      loan_id:data.id, member_id:data.memberId, member_name:data.memberName,
      principal_requested:data.principalRequested, principal_approved:data.principalApproved||"",
      cycle:data.cycle, instalments:data.instalments,
      purpose_of_loan:data.purposeOfLoan||"",
      primary_source_of_repayment:data.primarySourceOfRepayment||"",
      previous_loan_amount:data.previousLoanAmount||"", status:data.status,
      submission_date:data.submissionDate, approval_date:"", disbursed_date:"",
      rejection_date:"", rejection_reason:"", total_interest:"",
      total_debt:"", instalment_amount:""
    });
  } else if(action==="updateLoan"){
    db.loans = db.loans.map(l=>{
      if(l.loan_id!==data.id) return l;
      const u={...l}; const ups=data.updates;
      if(ups.status) u.status=ups.status;
      if(ups.principal_approved) u.principal_approved=ups.principal_approved;
      if(ups.instalments) u.instalments=ups.instalments;
      if(ups.approval_date) u.approval_date=ups.approval_date;
      if(ups.total_interest) u.total_interest=ups.total_interest;
      if(ups.total_debt) u.total_debt=ups.total_debt;
      if(ups.instalment_amount) u.instalment_amount=ups.instalment_amount;
      if(ups.disbursed_date) u.disbursed_date=ups.disbursed_date;
      if(ups.rejection_date) u.rejection_date=ups.rejection_date;
      if(ups.rejection_reason) u.rejection_reason=ups.rejection_reason;
      return u;
    });
  } else if(action==="saveSchedule"){
    const schs=Array.isArray(data)?data:[data];
    schs.forEach(sc=>{
      db.schedules=db.schedules.filter(s=>s.schedule_id!==sc.id);
      db.schedules.push({schedule_id:sc.id,loan_id:sc.loanId,instalment:sc.instalment,due_date:sc.dueDate,amount_due:sc.amountDue,amount_paid:sc.amountPaid,remaining:sc.remaining,status:sc.status});
    });
  } else if(action==="updateSchedule"){
    db.schedules=db.schedules.map(s=>{
      if(s.schedule_id!==data.id) return s;
      const u={...s},ups=data.updates;
      if(ups.amount_paid!==undefined) u.amount_paid=ups.amount_paid;
      if(ups.remaining!==undefined) u.remaining=ups.remaining;
      if(ups.status) u.status=ups.status;
      return u;
    });
  } else if(action==="savePayment"){
    db.payments=db.payments.filter(p=>p.payment_id!==data.id);
    db.payments.push({payment_id:data.id,loan_id:data.loanId,member_name:data.memberName,amount:data.amount,method:data.method,date:data.date,receipt:data.receipt,sender_phone:data.senderPhone||""});
  }
  lsSave(db);
  // 2. Also fire to Google Sheets in background (best effort)
  gasPost(action, data);
  return Promise.resolve({success:true});
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [role,setRole]   = useState(null);
  const [tab,setTab]     = useState("dashboard");
  const [aTab,setATab]   = useState("newMember");
  const [loading,setLoading]   = useState(false);

  const [members,setMembers]   = useState([]);
  const [loans,setLoans]       = useState([]);
  const [schedules,setSchedules] = useState([]);
  const [payments,setPayments] = useState([]);
  const [appModal,setAppModal] = useState(null);
  const [rejModal,setRejModal] = useState(null);
  const [rejReason,setRejReason] = useState("");
  const [mForm,setMForm]       = useState(EM);
  const [gForm,setGForm]       = useState(EG);
  const [lForm,setLForm]       = useState(EL);
  const [pForm,setPForm]       = useState({scheduleId:"",amount:"",method:"CASH",receipt:"",senderPhone:""});
  const [toast,setToast]       = useState(null);
  const [search,setSearch]     = useState("");
  const [expMember,setExpMember] = useState(null);
  const [schedLoan,setSchedLoan] = useState("");

  const showToast = (msg,color=c.green) => { setToast({msg,color}); setTimeout(()=>setToast(null),4000); };

  const loadData = useCallback(async()=>{
    setLoading(true);
    try {
      // Load from localStorage first (instant)
      const cached = lsLoad();
      if(cached.members.length||cached.loans.length||cached.schedules.length||cached.payments.length){
        setMembers((cached.members||[]).map(mapMember));
        setLoans((cached.loans||[]).map(mapLoan));
        setSchedules((cached.schedules||[]).map(mapSchedule));
        setPayments((cached.payments||[]).map(mapPayment));
        setDbOk(true);
        setLoading(false);
      }
      // Then try fresh from Google Sheets in background
      const fresh = await apiGet("getAll");
      if(fresh && fresh.members){
        setMembers((fresh.members||[]).map(mapMember));
        setLoans((fresh.loans||[]).map(mapLoan));
        setSchedules((fresh.schedules||[]).map(mapSchedule));
        setPayments((fresh.payments||[]).map(mapPayment));
        setDbOk(true);
      }
    } catch(e){ showToast("⚠ "+e.message,c.red); }
    setLoading(false);
  },[]);

  useEffect(()=>{ loadData(); },[]);

  // Derived
  const overdueList = useMemo(()=>
    schedules.filter(sc=>sc.status!=="PAID"&&daysDiff(sc.dueDate)>0)
      .map(sc=>{const loan=loans.find(l=>l.id===sc.loanId);const days=daysDiff(sc.dueDate);return{...sc,loan,days,band:overdueband(days),memberName:loan?.memberName||"—"};})
      .sort((a,b)=>b.days-a.days),
  [schedules,loans]);

  const PAR = portfolioAtRisk => overdueList.reduce((s,sc)=>s+sc.remaining,0);
  const portfolioAtRisk = overdueList.reduce((s,sc)=>s+sc.remaining,0);
  const pendingLoans = loans.filter(l=>l.status==="PENDING");
  const activeLoans  = loans.filter(l=>l.status==="ACTIVE");
  const rejLoans     = loans.filter(l=>l.status==="REJECTED");
  const todayM       = members.filter(m=>m.joinDate===todayStr);
  const todayOut     = loans.filter(l=>l.disbursedDate===todayStr).reduce((s,l)=>s+(l.principalApproved||0),0);
  const todayIn      = payments.filter(p=>p.date===todayStr).reduce((s,p)=>s+p.amount,0);
  const thisMonth    = TODAY.toISOString().slice(0,7);
  const mOut         = loans.filter(l=>l.disbursedDate?.startsWith(thisMonth)).reduce((s,l)=>s+(l.principalApproved||0),0);
  const mIn          = payments.filter(p=>p.date.startsWith(thisMonth)).reduce((s,p)=>s+p.amount,0);
  const mInterest    = loans.filter(l=>l.approvalDate?.startsWith(thisMonth)&&l.totalInterest).reduce((s,l)=>s+l.totalInterest,0);
  const portVal      = activeLoans.reduce((s,l)=>s+(l.totalDebt||0),0);
  const activeSchs   = schedules.filter(sc=>{ const loan=loans.find(l=>l.id===sc.loanId); return loan?.status==="ACTIVE"&&sc.status!=="PAID"; });
  const filteredM    = members.filter(m=>!search||m.fullName.toLowerCase().includes(search.toLowerCase())||m.phone.includes(search)||m.id.toLowerCase().includes(search.toLowerCase()));

  // Approve
  const openApprove = loan => { const calc=calcLoan(loan.principalRequested,loan.cycle,loan.instalments); setAppModal({loan,approvedAmount:loan.principalRequested,approvedInstalments:loan.instalments,...calc}); };
  const updateApp = (field,value) => {
    setAppModal(prev=>{
      const amt=field==="approvedAmount"?Number(value)||0:Number(prev.approvedAmount)||0;
      const ins=field==="approvedInstalments"?Number(value)||1:Number(prev.approvedInstalments)||1;
      const calc=(amt>0&&ins>0)?calcLoan(amt,prev.loan.cycle,ins):{totalInterest:0,totalDebt:0,instalmentAmount:0,months:0};
      return {...prev,[field]:value,...calc};
    });
  };
  const confirmApprove = async() => {
    setSyncing(true);
    const {loan,approvedAmount,approvedInstalments,totalInterest,totalDebt,instalmentAmount}=appModal;
    await apiPost("updateLoan",{id:loan.id,updates:{principal_approved:Number(approvedAmount),instalments:Number(approvedInstalments),status:"APPROVED",approval_date:todayStr,total_interest:totalInterest,total_debt:totalDebt,instalment_amount:instalmentAmount}});
    setLoans(prev=>prev.map(l=>l.id===loan.id?{...l,status:"APPROVED",principalApproved:Number(approvedAmount),instalments:Number(approvedInstalments),approvalDate:todayStr,totalInterest,totalDebt,instalmentAmount}:l));
    setAppModal(null); setSyncing(false);
    showToast(`✓ Loan ${loan.id} approved and saved.`);
  };

  // Reject
  const openReject = loan => { setRejModal(loan); setRejReason(""); };
  const confirmReject = async() => {
    if(!rejReason.trim()){showToast("Please enter a rejection reason.",c.red);return;}
    setSyncing(true);
    await apiPost("updateLoan",{id:rejModal.id,updates:{status:"REJECTED",rejection_date:todayStr,rejection_reason:rejReason.trim()}});
    setLoans(prev=>prev.map(l=>l.id===rejModal.id?{...l,status:"REJECTED",rejectionDate:todayStr,rejectionReason:rejReason.trim()}:l));
    setSyncing(false); setRejModal(null); setRejReason("");
    showToast(`✗ Loan ${rejModal.id} rejected and saved.`,c.red);
  };

  // Disburse
  const markDisbursed = async loan => {
    setSyncing(true);
    await apiPost("updateLoan",{id:loan.id,updates:{status:"ACTIVE",disbursed_date:todayStr}});

          <div style={CARD}><div style={SEC}>Payments Received Today</div>{payments.filter(p=>p.date===todayStr).length===0?<div style={{color:c.muted,fontSize:"12px"}}>No payments today.</div>:<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>Receipt</th><th style={TH}>Member</th><th style={TH}>Amount</th><th style={TH}>Method</th></tr></thead><tbody>{payments.filter(p=>p.date===todayStr).map(p=><tr key={p.id}><td style={{...TD,fontFamily:"monospace",color:c.accent}}>{p.receipt}</td><td style={TD}>{p.memberName}</td><td style={{...TD,fontFamily:"monospace",color:c.green}}>{GHS(p.amount)}</td><td style={TD}><span style={{background:p.method==="MOMO"?c.blueSoft:c.accentSoft,color:p.method==="MOMO"?c.blue:c.accent,padding:"2px 8px",borderRadius:"10px",fontSize:"10px",fontFamily:"monospace"}}>{p.method}</span></td></tr>)}</tbody></table>}</div>
        </>}

        {tab==="monthly"&&<>

            <div style={{...CARD,marginBottom:0}}><div style={SEC}>Cash Flow</div>
              <div style={{marginBottom:"14px"}}><div style={{fontSize:"10px",color:c.muted,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Money Out</div><div style={{fontSize:"22px",fontFamily:"monospace",color:c.red}}>− {GHS(mOut)}</div></div>
              <div style={{marginBottom:"14px"}}><div style={{fontSize:"10px",color:c.muted,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Money In</div><div style={{fontSize:"22px",fontFamily:"monospace",color:c.green}}>+ {GHS(mIn)}</div></div>
              <div style={{borderTop:`2px solid ${c.accent}`,paddingTop:"14px"}}><div style={{fontSize:"10px",color:c.accent,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Net Position</div><div style={{fontSize:"26px",fontFamily:"monospace",fontWeight:"bold",color:mIn-mOut>=0?c.green:c.red}}>{mIn-mOut>=0?"+":""}{GHS(mIn-mOut)}</div></div>
            </div>
          </div>
          <div style={CARD}><div style={SEC}>Overdue Breakdown</div>{overdueList.length===0?<div style={{color:c.green,fontSize:"12px"}}>✓ No overdue payments.</div>:<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>Member</th><th style={TH}>Loan</th><th style={TH}>Due Date</th><th style={TH}>Days</th><th style={TH}>Remaining</th><th style={TH}>Band</th><th style={TH}>Action</th></tr></thead><tbody>{overdueList.map(sc=><tr key={sc.id}><td style={TD}>{sc.memberName}</td><td style={{...TD,fontFamily:"monospace",color:c.accent}}>{sc.loanId}</td><td style={{...TD,fontFamily:"monospace",fontSize:"11px"}}>{sc.dueDate}</td><td style={{...TD,fontFamily:"monospace",color:c.red,fontWeight:"bold"}}>{sc.days}d</td><td style={{...TD,fontFamily:"monospace",color:c.red}}>{GHS(sc.remaining)}</td><td style={TD}><span style={riskBand(sc.band.color)}>{sc.band.label}</span></td><td style={{...TD,fontSize:"11px",color:c.muted}}>{sc.band.action}</td></tr>)}</tbody></table>}</div>
        </>}

        {tab==="loans"&&<>
          <div style={SEC}>All Loans</div>
          {rejLoans.length>0&&<div style={{...CARD,borderLeft:`4px solid ${c.red}`,background:"rgba(239,68,68,0.04)",marginBottom:"16px"}}><div style={{fontSize:"11px",color:c.red,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"10px"}}>Rejection History</div>{rejLoans.map(l=><div key={l.id} style={{padding:"10px 0",borderBottom:`1px solid ${c.border}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{fontFamily:"monospace",fontSize:"12px",color:c.accent}}>{l.id}</span><span style={{fontFamily:"monospace",fontSize:"11px",color:c.muted}}>{l.memberName} · {l.rejectionDate}</span></div><div style={{fontSize:"12px",color:c.muted,fontStyle:"italic"}}>"{l.rejectionReason}"</div></div>)}</div>}
          <div style={CARD}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>ID</th><th style={TH}>Member</th><th style={TH}>Requested</th><th style={TH}>Approved</th><th style={TH}>Total Debt</th><th style={TH}>Cycle</th><th style={TH}>Status</th><th style={TH}>Action</th></tr></thead><tbody>{loans.map(l=><tr key={l.id}><td style={{...TD,fontFamily:"monospace",color:c.accent}}>{l.id}</td><td style={TD}>{l.memberName}</td><td style={{...TD,fontFamily:"monospace",color:c.muted,fontSize:"11px"}}>{GHS(l.principalRequested)}</td><td style={{...TD,fontFamily:"monospace"}}>{l.principalApproved?GHS(l.principalApproved):"—"}</td><td style={{...TD,fontFamily:"monospace",color:c.green}}>{l.totalDebt?GHS(l.totalDebt):"—"}</td><td style={TD}>{l.cycle}</td><td style={TD}><span style={pill(l.status)}>{l.status}</span></td><td style={TD}>{l.status==="PENDING"&&<><button onClick={()=>openApprove(l)} style={{background:c.accent,color:"#000",border:"none",borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontWeight:"bold",fontSize:"11px",marginRight:"6px"}}>APPROVE</button><button onClick={()=>openReject(l)} style={{background:c.redSoft,color:c.red,border:`1px solid ${c.red}`,borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontWeight:"bold",fontSize:"11px"}}>REJECT</button></>}{l.status==="APPROVED"&&<span style={{color:c.muted,fontSize:"11px",fontStyle:"italic"}}>Awaiting disbursement by Admin</span>}{l.status==="REJECTED"&&<span style={{fontSize:"11px",color:c.muted,fontStyle:"italic"}}>"{l.rejectionReason?.slice(0,30)}..."</span>}{(l.status==="ACTIVE"||l.status==="PAID_OFF")&&<span style={{color:c.muted,fontSize:"11px"}}>—</span>}</td></tr>)}</tbody></table></div>
        </>}

        {tab==="members"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"10px"}}>
            <div style={SEC}>Member Register — {members.length} Member{members.length!==1?"s":""}</div>
            <input style={{...INP,width:"240px",fontSize:"12px"}} placeholder="🔍 Search name, phone or ID..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {filteredM.length===0&&<div style={{...CARD,color:c.muted,fontSize:"12px",textAlign:"center",padding:"30px"}}>No members found{search?` matching "${search}"`:""}.</div>}
          {filteredM.map(m=>{
            const mLoans=loans.filter(l=>l.memberId===m.id);
            const isExp=expMember===m.id;
            return <div key={m.id} style={CARD}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setExpMember(isExp?null:m.id)}>
                <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                  <div style={{width:"40px",height:"40px",borderRadius:"50%",background:c.accentSoft,border:`2px solid ${c.accent}`,display:"flex",alignItems:"center",justifyContent:"center",color:c.accent,fontWeight:"bold",fontSize:"14px",flexShrink:0}}>{m.fullName.charAt(0)}</div>
                  <div><div style={{fontWeight:"bold",color:c.text}}>{m.fullName}</div><div style={{fontSize:"11px",color:c.muted,fontFamily:"monospace"}}>{m.id} · {m.phone} · {m.typeOfBusiness}</div></div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                  {mLoans.map(l=><span key={l.id} style={pill(l.status)}>{l.status}</span>)}
                  <span style={{color:c.muted,fontSize:"12px"}}>{isExp?"▲":"▼"}</span>
                </div>
              </div>
              {isExp&&<div style={{marginTop:"16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px",paddingTop:"16px",borderTop:`1px solid ${c.border}`}}>
                <div>
                  <div style={{fontSize:"11px",color:c.blue,letterSpacing:"1px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"8px"}}>Customer Details</div>
                  {[["Phone",m.phone],["Gender",m.gender],["Marital Status",m.maritalStatus],["DOB",m.dob],["Address",m.residentialAddress],["Home Town",m.homeTown],["Dependents",m.dependents],["Business",m.typeOfBusiness],["Biz Location",m.businessLocation],["Worship",`${m.placeOfWorship||""}${m.worshipLocation?", "+m.worshipLocation:""}`],["Ghana Card",m.ghanaCard],["GPS",m.digitalAddress],["Alt MoMo",m.alternateMomo]].filter(([,v])=>v).map(([label,val])=>(
                    <div key={label} style={{display:"flex",gap:"8px",marginBottom:"4px",fontSize:"12px"}}><span style={{color:c.muted,minWidth:"100px"}}>{label}</span><span style={{color:c.text}}>{val}</span></div>
                  ))}
                </div>
                <div>
                  <div style={{fontSize:"11px",color:c.orange,letterSpacing:"1px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"8px"}}>Guarantor</div>
                  {m.guarantor&&[["Name",m.guarantor.name],["Relationship",m.guarantor.relationship],["Phone",m.guarantor.phone],["Address",m.guarantor.residentialAddress],["Occupation",m.guarantor.occupation],["Worship",m.guarantor.placeOfWorship]].filter(([,v])=>v).map(([label,val])=>(
                    <div key={label} style={{display:"flex",gap:"8px",marginBottom:"4px",fontSize:"12px"}}><span style={{color:c.muted,minWidth:"90px"}}>{label}</span><span style={{color:c.text}}>{val}</span></div>
                  ))}
                  <div style={{marginTop:"14px",fontSize:"11px",color:c.muted,letterSpacing:"1px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"8px"}}>Loan History</div>
                  {mLoans.length===0?<div style={{color:c.muted,fontSize:"12px"}}>No loans.</div>:mLoans.map(l=>(
                    <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${c.border}`,fontSize:"12px",flexWrap:"wrap",gap:"4px"}}>
                      <span style={{fontFamily:"monospace",color:c.accent}}>{l.id}</span>
                      <span>{GHS(l.principalRequested)}</span>
                      <span style={pill(l.status)}>{l.status}</span>
                      {l.status==="REJECTED"&&<span style={{fontSize:"11px",color:c.muted,fontStyle:"italic",width:"100%"}}>{l.rejectionReason}</span>}
                    </div>
                  ))}
                </div>
              </div>}
            </div>;
          })}
        </>}

      </div>}
      <Footer/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
