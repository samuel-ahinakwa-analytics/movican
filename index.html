// ── HELPERS ───────────────────────────────────────────────────────────────────
const TODAY    = new Date();
const todayStr = TODAY.toISOString().split("T")[0];
const fmt      = d => new Date(d).toISOString().split("T")[0];
const addDays  = (ds,n) => { const d=new Date(ds); d.setDate(d.getDate()+n); return fmt(d); };
const addMonths= (ds,n) => { const d=new Date(ds); d.setMonth(d.getMonth()+n); return fmt(d); };
const daysDiff = ds => { const due=new Date(ds); due.setHours(0,0,0,0); const now=new Date(); now.setHours(0,0,0,0); return Math.floor((now-due)/86400000); };
const GHS      = n => `GHS ${(n||0).toLocaleString(undefined,{minimumFractionDigits:2})}`;
const uid      = () => Math.random().toString(36).slice(2,8).toUpperCase();

function calcLoan(principal,cycle,instalments){
  const months = cycle==="WEEKLY" ? instalments/4 : instalments;
  const totalInterest = principal*0.05*months;
  const totalDebt = principal+totalInterest;
  const instalmentAmount = totalDebt/instalments;
  return {totalInterest,totalDebt,instalmentAmount,months};
}
function genSchedule(loanId,approvalDate,cycle,instalments,instalmentAmount){
  return Array.from({length:instalments},(_,i)=>({
    id:`SCH-${loanId}-${i+1}`,loanId,instalment:i+1,
    dueDate:cycle==="WEEKLY"?addDays(approvalDate,21+i*7):addMonths(approvalDate,2+i),
    amountDue:instalmentAmount,amountPaid:0,remaining:instalmentAmount,status:"UNPAID",
  }));
}
function overdueband(days){
  if(days<=0)  return null;
  if(days<=7)  return {label:"WATCH",    color:c.accent, action:"Monitor closely"};
  if(days<=14) return {label:"CALL",     color:c.orange, action:"Call the customer now"};
  if(days<=30) return {label:"ESCALATE", color:c.red,    action:"Visit / send written notice"};
  if(days<=90) return {label:"CRITICAL", color:c.purple, action:"Guarantor / legal action"};
  return             {label:"WRITE-OFF", color:"#6B7280",action:"Escalate immediately"};
}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function lsLoad(){ try{ const r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):{members:[],loans:[],schedules:[],payments:[]}; }catch(e){ return {members:[],loans:[],schedules:[],payments:[]}; } }
function lsSave(db){ try{ localStorage.setItem(LS_KEY,JSON.stringify(db)); }catch(e){} }

// ── GAS GET via JSONP ─────────────────────────────────────────────────────────
function gasGet(){
  return new Promise(resolve=>{
    const cb  = "cb_"+Math.random().toString(36).slice(2,10);
    const s   = document.createElement("script");
    let done  = false;
    window[cb]= d=>{ done=true; try{document.head.removeChild(s);}catch(e){} delete window[cb]; resolve(d); };
    s.src     = `${GAS_URL}?action=getAll&callback=${cb}`;
    s.onerror = ()=>{ if(!done){done=true;delete window[cb];resolve(null);} };
    document.head.appendChild(s);
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){}resolve(null);} },15000);
  });
}

// ── GAS POST (no-cors fire-and-forget) ───────────────────────────────────────
function gasPost(action,data){
  fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,data})}).catch(()=>{});
}

// ── LOAD ALL DATA ─────────────────────────────────────────────────────────────
async function loadAllData(){
  try {
    const fresh = await gasGet();
    if(fresh && fresh.members){
      const db={
        members:  fresh.members  ||[],
        loans:    fresh.loans    ||[],
        schedules:fresh.schedules||[],
        payments: fresh.payments ||[]
      };
      lsSave(db);
      return db;
    }
  } catch(e){}
  return lsLoad();
}

// ── API POST — saves to localStorage immediately + fires GAS in background ────
function apiPost(action,data){
  const db = lsLoad();

  if(action==="saveMember"){
    const g=data.guarantor||{};
    const row={
      member_id:data.id,full_name:data.fullName,phone:data.phone,
      gender:data.gender,marital_status:data.maritalStatus,dob:data.dob,
      residential_address:data.residentialAddress,home_town:data.homeTown,
      dependents:data.dependents,type_of_business:data.typeOfBusiness,
      business_location:data.businessLocation,place_of_worship:data.placeOfWorship,
      worship_location:data.worshipLocation,ghana_card:data.ghanaCard,
      digital_address:data.digitalAddress,alternate_momo:data.alternateMomo,
      join_date:data.joinDate,
      guarantor_name:g.name||"",guarantor_relationship:g.relationship||"",
      guarantor_gender:g.gender||"",guarantor_marital_status:g.maritalStatus||"",
      guarantor_dob:g.dob||"",guarantor_phone:g.phone||"",
      guarantor_residential_address:g.residentialAddress||"",
      guarantor_home_town:g.homeTown||"",guarantor_dependents:g.dependents||"",
      guarantor_occupation:g.occupation||"",
      guarantor_business_location:g.businessLocation||"",
      guarantor_place_of_worship:g.placeOfWorship||"",
      guarantor_worship_location:g.worshipLocation||""
    };
    db.members=db.members.filter(m=>m.member_id!==data.id);
    db.members.push(row);
    lsSave(db);
    gasPost("saveMember",data);
    return Promise.resolve({success:true});
  }

  if(action==="saveLoan"){
    const row={
      loan_id:data.id,member_id:data.memberId,member_name:data.memberName,
      principal_requested:data.principalRequested,principal_approved:"",
      cycle:data.cycle,instalments:data.instalments,
      purpose_of_loan:data.purposeOfLoan||"",
      primary_source_of_repayment:data.primarySourceOfRepayment||"",
      previous_loan_amount:data.previousLoanAmount||"",status:data.status,
      submission_date:data.submissionDate,approval_date:"",disbursed_date:"",
      rejection_date:"",rejection_reason:"",total_interest:"",total_debt:"",instalment_amount:""
    };
    db.loans=db.loans.filter(l=>l.loan_id!==data.id);
    db.loans.push(row);
    lsSave(db);
    gasPost("saveLoan",data);
    return Promise.resolve({success:true});
  }

  if(action==="updateLoan"){
    db.loans=db.loans.map(l=>{
      if(l.loan_id!==data.id) return l;
      const u={...l};
      Object.keys(data.updates).forEach(k=>{ u[k]=data.updates[k]; });
      return u;
    });
    lsSave(db);
    gasPost("updateLoan",data);
    return Promise.resolve({success:true});
  }

  if(action==="saveSchedule"){
    const schs=Array.isArray(data)?data:[data];
    schs.forEach(sc=>{
      const row={schedule_id:sc.id,loan_id:sc.loanId,instalment:sc.instalment,due_date:sc.dueDate,amount_due:sc.amountDue,amount_paid:sc.amountPaid,remaining:sc.remaining,status:sc.status};
      db.schedules=db.schedules.filter(s=>s.schedule_id!==sc.id);
      db.schedules.push(row);
    });
    lsSave(db);
    gasPost("saveSchedule",data);
    return Promise.resolve({success:true});
  }

  if(action==="updateSchedule"){
    db.schedules=db.schedules.map(s=>{
      if(s.schedule_id!==data.id) return s;
      const u={...s};
      Object.keys(data.updates).forEach(k=>{ u[k]=data.updates[k]; });
      return u;
    });
    lsSave(db);
    gasPost("updateSchedule",data);
    return Promise.resolve({success:true});
  }

  if(action==="savePayment"){
    const row={payment_id:data.id,loan_id:data.loanId,member_name:data.memberName,amount:data.amount,method:data.method,date:data.date,receipt:data.receipt,sender_phone:data.senderPhone||""};
    db.payments=db.payments.filter(p=>p.payment_id!==data.id);
    db.payments.push(row);
    lsSave(db);
    gasPost("savePayment",data);
    return Promise.resolve({success:true});
  }

  return Promise.resolve({success:true});
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [role,setRole]     = useState(null);
  const [tab,setTab]       = useState("dashboard");
  const [aTab,setATab]     = useState("newMember");
  const [loading,setLoading]   = useState(false);
  const [syncing,setSyncing]   = useState(false);
  const [dbOk,setDbOk]         = useState(true);
  const [members,setMembers]   = useState([]);
  const [loans,setLoans]       = useState([]);
  const [schedules,setSchedules] = useState([]);
  const [payments,setPayments] = useState([]);
  const [appModal,setAppModal] = useState(null);
  const [rejModal,setRejModal] = useState(null);
  const [rejReason,setRejReason] = useState("");
  const [mForm,setMForm]       = useState(EM);
  const [gForm,setGForm]       = useState(EG);
  const [lForm,setLForm]       = useState(EL);
  const [pForm,setPForm]       = useState({scheduleId:"",amount:"",method:"CASH",receipt:"",senderPhone:""});
  const [toast,setToast]       = useState(null);
  const [search,setSearch]     = useState("");
  const [expMember,setExpMember] = useState(null);
  const [schedLoan,setSchedLoan] = useState("");
  const [showPwModal,setShowPwModal] = useState(false);
  const [pwInput,setPwInput]   = useState("");
  const [pwError,setPwError]   = useState("");

  const showToast = (msg,color=c.green) => { setToast({msg,color}); setTimeout(()=>setToast(null),4000); };

  // ── Load data ───────────────────────────────────────────────────────────────
  const loadData = useCallback(async()=>{
    setLoading(true);
    // Show cached data instantly
    const cached = lsLoad();
    if(cached.members.length||cached.loans.length){
      setMembers(cached.members.map(mapMember));
      setLoans(cached.loans.map(mapLoan));
      setSchedules(cached.schedules.map(mapSchedule));
      setPayments(cached.payments.map(mapPayment));
      setDbOk(true);
      setLoading(false);
    }
    // Fetch fresh from GAS
    try {
      const fresh = await loadAllData();
      if(fresh&&fresh.members){
        setMembers(fresh.members.map(mapMember));
        setLoans(fresh.loans.map(mapLoan));
        setSchedules(fresh.schedules.map(mapSchedule));
        setPayments(fresh.payments.map(mapPayment));
        setDbOk(true);
      }
    } catch(e){}
    setLoading(false);
  },[]);

  useEffect(()=>{ loadData(); },[]);

  // ── Derived ─────────────────────────────────────────────────────────────────
  const overdueList = useMemo(()=>
    schedules.filter(sc=>sc.status!=="PAID"&&daysDiff(sc.dueDate)>0)
      .map(sc=>{const loan=loans.find(l=>l.id===sc.loanId);const days=daysDiff(sc.dueDate);return{...sc,loan,days,band:overdueband(days),memberName:loan?.memberName||"—"};})
      .sort((a,b)=>b.days-a.days),
  [schedules,loans]);

  const portfolioAtRisk = overdueList.reduce((s,sc)=>s+sc.remaining,0);
  const pendingLoans = loans.filter(l=>l.status==="PENDING");
  const activeLoans  = loans.filter(l=>l.status==="ACTIVE");
  const rejLoans     = loans.filter(l=>l.status==="REJECTED");
  const todayM       = members.filter(m=>m.joinDate===todayStr);
  const todayOut     = loans.filter(l=>l.disbursedDate===todayStr).reduce((s,l)=>s+(l.principalApproved||0),0);
  const todayIn      = payments.filter(p=>p.date===todayStr).reduce((s,p)=>s+p.amount,0);
  const thisMonth    = TODAY.toISOString().slice(0,7);
  const mOut         = loans.filter(l=>l.disbursedDate?.startsWith(thisMonth)).reduce((s,l)=>s+(l.principalApproved||0),0);
  const mIn          = payments.filter(p=>p.date.startsWith(thisMonth)).reduce((s,p)=>s+p.amount,0);
  const mInterest    = loans.filter(l=>l.approvalDate?.startsWith(thisMonth)&&l.totalInterest).reduce((s,l)=>s+l.totalInterest,0);
  const portVal      = activeLoans.reduce((s,l)=>s+(l.totalDebt||0),0);
  const activeSchs   = schedules.filter(sc=>{ const loan=loans.find(l=>l.id===sc.loanId); return loan?.status==="ACTIVE"&&sc.status!=="PAID"; });
  const filteredM    = members.filter(m=>!search||m.fullName.toLowerCase().includes(search.toLowerCase())||m.phone.includes(search)||m.id.toLowerCase().includes(search.toLowerCase()));

  // ── Approve ─────────────────────────────────────────────────────────────────
  const openApprove = loan => { const calc=calcLoan(loan.principalRequested,loan.cycle,loan.instalments); setAppModal({loan,approvedAmount:loan.principalRequested,approvedInstalments:loan.instalments,...calc}); };
  const updateApp = (field,value) => {
    setAppModal(prev=>{
      const amt=field==="approvedAmount"?Number(value)||0:Number(prev.approvedAmount)||0;
      const ins=field==="approvedInstalments"?Number(value)||1:Number(prev.approvedInstalments)||1;
      const calc=(amt>0&&ins>0)?calcLoan(amt,prev.loan.cycle,ins):{totalInterest:0,totalDebt:0,instalmentAmount:0,months:0};
      return {...prev,[field]:value,...calc};
    });
  };
  const confirmApprove = async() => {
    setSyncing(true);
    const {loan,approvedAmount,approvedInstalments,totalInterest,totalDebt,instalmentAmount}=appModal;
    await apiPost("updateLoan",{id:loan.id,updates:{principal_approved:Number(approvedAmount),instalments:Number(approvedInstalments),status:"APPROVED",approval_date:todayStr,total_interest:totalInterest,total_debt:totalDebt,instalment_amount:instalmentAmount}});
    setLoans(prev=>prev.map(l=>l.id===loan.id?{...l,status:"APPROVED",principalApproved:Number(approvedAmount),instalments:Number(approvedInstalments),approvalDate:todayStr,totalInterest,totalDebt,instalmentAmount}:l));
    setAppModal(null); setSyncing(false);
    showToast(`✓ Loan ${loan.id} approved.`);
  };

  // ── Reject ──────────────────────────────────────────────────────────────────
  const openReject = loan => { setRejModal(loan); setRejReason(""); };
  const confirmReject = async() => {
    if(!rejReason.trim()){showToast("Please enter a rejection reason.",c.red);return;}
    setSyncing(true);
    await apiPost("updateLoan",{id:rejModal.id,updates:{status:"REJECTED",rejection_date:todayStr,rejection_reason:rejReason.trim()}});
    setLoans(prev=>prev.map(l=>l.id===rejModal.id?{...l,status:"REJECTED",rejectionDate:todayStr,rejectionReason:rejReason.trim()}:l));
    setSyncing(false); setRejModal(null); setRejReason("");
    showToast(`✗ Loan ${rejModal.id} rejected.`,c.red);
  };

  // ── Disburse ─────────────────────────────────────────────────────────────────
  const markDisbursed = async loan => {
    setSyncing(true);
    const currentLoan = loans.find(l=>l.id===loan.id)||loan;
    const approvalDate = currentLoan.approvalDate||todayStr;
    const instalments  = Number(currentLoan.instalments)||Number(loan.instalments);
    const instalmentAmt= Number(currentLoan.instalmentAmount)||Number(loan.instalmentAmount);
    await apiPost("updateLoan",{id:loan.id,updates:{status:"ACTIVE",disbursed_date:todayStr}});
    const newSch=genSchedule(loan.id,approvalDate,currentLoan.cycle||loan.cycle,instalments,instalmentAmt);
    await apiPost("saveSchedule",newSch);

            <div style={G2}><div><label style={LBL}>Occupation / Business</label><input style={INP} value={gForm.occupation} onChange={e=>setGForm(p=>({...p,occupation:e.target.value}))}/></div><div><label style={LBL}>Business Location</label><input style={INP} value={gForm.businessLocation} onChange={e=>setGForm(p=>({...p,businessLocation:e.target.value}))}/></div></div>

              </select>
            </div>
            <div style={G2}><div><label style={LBL}>Loan Amount (GHS) *</label><input style={INP} type="number" value={lForm.principalRequested} onChange={e=>setLForm(p=>({...p,principalRequested:e.target.value}))}/></div><div><label style={LBL}>Previous Loan Amount</label><input style={INP} value={lForm.previousLoanAmount} onChange={e=>setLForm(p=>({...p,previousLoanAmount:e.target.value}))}/></div></div>
            <div style={G2}><div><label style={LBL}>Repayment Cycle *</label><select style={INP} value={lForm.cycle} onChange={e=>setLForm(p=>({...p,cycle:e.target.value}))}><option value="WEEKLY">Weekly</option><option value="MONTHLY">Monthly</option></select></div><div><label style={LBL}>Number of Instalments *</label><input style={INP} type="number" min="1" value={lForm.instalments} onChange={e=>setLForm(p=>({...p,instalments:e.target.value}))}/></div></div>
            {lForm.principalRequested&&lForm.instalments&&Number(lForm.instalments)>0&&(()=>{

              return <div style={{padding:"12px",background:c.greenSoft,borderRadius:"8px",marginBottom:"14px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px"}}>

              </div>;
            })()}
            <div style={G2}><div><label style={LBL}>Purpose of Loan</label><input style={INP} value={lForm.purposeOfLoan} onChange={e=>setLForm(p=>({...p,purposeOfLoan:e.target.value}))}/></div><div><label style={LBL}>Source of Repayment</label><input style={INP} value={lForm.primarySourceOfRepayment} onChange={e=>setLForm(p=>({...p,primarySourceOfRepayment:e.target.value}))}/></div></div>
            <div><label style={LBL}>Submission Date</label><input style={INP} type="date" value={lForm.submissionDate} onChange={e=>setLForm(p=>({...p,submissionDate:e.target.value}))}/></div>

            <div style={CARD}>

                  <td style={{...TD,fontFamily:"monospace",color:c.muted,fontSize:"11px"}}>{GHS(l.principalRequested)}</td>

                    {l.status==="PAID_OFF"&&<span style={{color:c.muted,fontSize:"11px"}}>✓ Paid Off</span>}

              </table>
            </div>

        </>}

        {aTab==="schedule"&&(()=>{
          const activeLList=loans.filter(l=>l.status==="ACTIVE");

          const lSchs=selLoan?schedules.filter(sc=>sc.loanId===selLoan.id):[];
          const tp=lSchs.reduce((s,sc)=>s+sc.amountPaid,0);
          const tr=lSchs.reduce((s,sc)=>s+sc.remaining,0);
          const prog=selLoan&&selLoan.totalDebt>0?(tp/selLoan.totalDebt)*100:0;

              <select style={{...INP,fontSize:"14px"}} value={schedLoan} onChange={e=>setSchedLoan(e.target.value)}>
                <option value="">-- Choose a member --</option>

                  const ls=schedules.filter(sc=>sc.loanId===loan.id);

                  return <option key={loan.id} value={loan.id}>{loan.memberName} — {loan.cycle} — {paid}/{loan.instalments} paid{ov>0?` — ⚠ ${ov} overdue`:""}</option>;

                  <div style={{textAlign:"right"}}><div style={{fontSize:"10px",color:c.muted}}>Total</div><div style={{fontFamily:"monospace",fontWeight:"bold"}}>{GHS(selLoan.totalDebt)}</div></div>

              <tbody>{lSchs.map(sc=>{const days=daysDiff(sc.dueDate);const band=sc.status!=="PAID"?overdueband(days):null;return <tr key={sc.id}><td style={{...TD,fontFamily:"monospace",fontWeight:"bold",color:c.accent}}>#{sc.instalment}</td><td style={{...TD,fontFamily:"monospace",fontSize:"11px"}}>{sc.dueDate}</td><td style={{...TD,fontFamily:"monospace"}}>{GHS(sc.amountDue)}</td><td style={{...TD,fontFamily:"monospace",color:c.green}}>{GHS(sc.amountPaid)}</td><td style={{...TD,fontFamily:"monospace",color:sc.remaining>0?c.red:c.green,fontWeight:"bold"}}>{GHS(sc.remaining)}</td><td style={TD}><span style={pill(sc.status)}>{sc.status}</span></td><td style={TD}>{band?<span style={riskBand(band.color)}>{days}d overdue</span>:sc.status==="PAID"?<span style={{color:c.green,fontSize:"11px"}}>✓</span>:<span style={{color:c.muted,fontSize:"11px"}}>Upcoming</span>}</td></tr>;})}</tbody></table>
            </div>}
          </>;

      <div style={{display:"flex",gap:"4px",padding:"14px 28px 0",borderBottom:`1px solid ${c.border}`,overflowX:"auto"}}>

          <button key={k} onClick={()=>setTab(k)} style={{padding:"9px 18px",border:"none",background:tab===k?c.accentSoft:"transparent",color:tab===k?c.accent:c.muted,borderBottom:tab===k?`2px solid ${c.accent}`:"2px solid transparent",cursor:"pointer",fontSize:"13px",fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>
      {loading&&<Spinner msg="Loading..."/>}
      {!loading&&<div style={{padding:"24px 28px",maxWidth:"1280px"}}>

        {tab==="dashboard"&&<>
          <div style={SEC}>Today — {TODAY.toDateString()}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px",marginBottom:"24px"}}>
            {[[c.accent,todayM.length,"New Members"],[c.orange,pendingLoans.length,"Pending Approval"],[c.blue,GHS(todayOut),"Disbursed Today"],[c.green,GHS(todayIn),"Collected Today"]].map(([ac,val,label])=>(
              <div key={label} style={SC(ac)}><div style={{fontSize:typeof val==="number"?"28px":"18px",fontWeight:"bold",color:c.text,lineHeight:1.2,fontFamily:"monospace"}}>{val}</div><div style={{fontSize:"10px",color:c.muted,textTransform:"uppercase",letterSpacing:"1.5px",marginTop:"4px"}}>{label}</div></div>
            ))}
          </div>
          <div style={{...CARD,borderLeft:`4px solid ${c.red}`,background:overdueList.length>0?"rgba(239,68,68,0.06)":c.card}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:"11px",color:c.red,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"4px"}}>⚠ Portfolio at Risk</div><div style={{fontSize:"32px",fontFamily:"monospace",color:overdueList.length>0?c.red:c.muted,fontWeight:"bold"}}>{GHS(portfolioAtRisk)}</div><div style={{fontSize:"12px",color:c.muted,marginTop:"4px"}}>{overdueList.length} overdue instalment{overdueList.length!==1?"s":""}</div></div>
              {overdueList.length===0&&<div style={{color:c.green,fontSize:"13px"}}>✓ All payments on track</div>}

            <div style={{...CARD,marginBottom:0}}><div style={SEC}>Loans Awaiting Approval</div>{pendingLoans.length===0?<div style={{color:c.muted,fontSize:"12px"}}>No pending loans.</div>:<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>Member</th><th style={TH}>Amount</th><th style={TH}>Cycle</th><th style={TH}>Actions</th></tr></thead><tbody>{pendingLoans.map(l=><tr key={l.id}><td style={TD}>{l.memberName}</td><td style={{...TD,fontFamily:"monospace"}}>{GHS(l.principalRequested)}</td><td style={TD}>{l.cycle}</td><td style={TD}><button onClick={()=>openApprove(l)} style={{background:c.accent,color:"#000",border:"none",borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontWeight:"bold",fontSize:"11px",marginRight:"6px"}}>APPROVE</button><button onClick={()=>openReject(l)} style={{background:c.redSoft,color:c.red,border:`1px solid ${c.red}`,borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontWeight:"bold",fontSize:"11px"}}>REJECT</button></td></tr>)}</tbody></table>}</div>
          </div>
          <div style={CARD}><div style={SEC}>Overdue — Action Required</div>{overdueList.length===0?<div style={{color:c.green,fontSize:"12px"}}>✓ No overdue payments.</div>:<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>Member</th><th style={TH}>Loan</th><th style={TH}>Due Date</th><th style={TH}>Days</th><th style={TH}>Owed</th><th style={TH}>Band</th><th style={TH}>Action</th></tr></thead><tbody>{overdueList.map(sc=><tr key={sc.id}><td style={TD}>{sc.memberName}</td><td style={{...TD,fontFamily:"monospace",color:c.accent}}>{sc.loanId}</td><td style={{...TD,fontFamily:"monospace",fontSize:"11px"}}>{sc.dueDate}</td><td style={{...TD,fontFamily:"monospace",color:c.red,fontWeight:"bold"}}>{sc.days}d</td><td style={{...TD,fontFamily:"monospace",color:c.red}}>{GHS(sc.remaining)}</td><td style={TD}><span style={riskBand(sc.band.color)}>{sc.band.label}</span></td><td style={{...TD,fontSize:"11px",color:c.muted}}>{sc.band.action}</td></tr>)}</tbody></table>}</div>
          <div style={CARD}><div style={SEC}>Payments Received Today</div>{payments.filter(p=>p.date===todayStr).length===0?<div style={{color:c.muted,fontSize:"12px"}}>No payments today.</div>:<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>Receipt</th><th style={TH}>Member</th><th style={TH}>Amount</th><th style={TH}>Method</th></tr></thead><tbody>{payments.filter(p=>p.date===todayStr).map(p=><tr key={p.id}><td style={{...TD,fontFamily:"monospace",color:c.accent}}>{p.receipt}</td><td style={TD}>{p.memberName}</td><td style={{...TD,fontFamily:"monospace",color:c.green}}>{GHS(p.amount)}</td><td style={TD}><span style={{background:p.method==="MOMO"?c.blueSoft:c.accentSoft,color:p.method==="MOMO"?c.blue:c.accent,padding:"2px 8px",borderRadius:"10px",fontSize:"10px",fontFamily:"monospace"}}>{p.method}</span></td></tr>)}</tbody></table>}</div>

          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px",marginBottom:"20px"}}>
            <div style={{...CARD,marginBottom:0}}><div style={SEC}>Loan Status Breakdown</div>{["PENDING","APPROVED","ACTIVE","REJECTED","PAID_OFF"].map(status=>{const count=loans.filter(l=>l.status===status).length;const total=loans.filter(l=>l.status===status).reduce((s,l)=>s+(l.principalApproved||l.principalRequested||0),0);return <div key={status} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${c.border}`}}><span style={pill(status)}>{status}</span><div style={{textAlign:"right"}}><div style={{fontFamily:"monospace",fontSize:"13px"}}>{count} loan{count!==1?"s":""}</div><div style={{fontFamily:"monospace",fontSize:"11px",color:c.muted}}>{GHS(total)}</div></div></div>;})}
            </div>
            <div style={{...CARD,marginBottom:0}}><div style={SEC}>Cash Flow</div>
              <div style={{marginBottom:"14px"}}><div style={{fontSize:"10px",color:c.muted,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Money Out</div><div style={{fontSize:"22px",fontFamily:"monospace",color:c.red}}>− {GHS(mOut)}</div></div>
              <div style={{marginBottom:"14px"}}><div style={{fontSize:"10px",color:c.muted,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Money In</div><div style={{fontSize:"22px",fontFamily:"monospace",color:c.green}}>+ {GHS(mIn)}</div></div>
              <div style={{borderTop:`2px solid ${c.accent}`,paddingTop:"14px"}}><div style={{fontSize:"10px",color:c.accent,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"1px"}}>Net Position</div><div style={{fontSize:"26px",fontFamily:"monospace",fontWeight:"bold",color:mIn-mOut>=0?c.green:c.red}}>{mIn-mOut>=0?"+":""}{GHS(mIn-mOut)}</div></div>
            </div>
          </div>
        </>}

        {tab==="loans"&&<>
          <div style={SEC}>All Loans</div>
          {rejLoans.length>0&&<div style={{...CARD,borderLeft:`4px solid ${c.red}`,background:"rgba(239,68,68,0.04)",marginBottom:"16px"}}><div style={{fontSize:"11px",color:c.red,letterSpacing:"2px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"10px"}}>Rejection History</div>{rejLoans.map(l=><div key={l.id} style={{padding:"10px 0",borderBottom:`1px solid ${c.border}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{fontFamily:"monospace",fontSize:"12px",color:c.accent}}>{l.id}</span><span style={{fontFamily:"monospace",fontSize:"11px",color:c.muted}}>{l.memberName} · {l.rejectionDate}</span></div><div style={{fontSize:"12px",color:c.muted,fontStyle:"italic"}}>"{l.rejectionReason}"</div></div>)}</div>}
          <div style={CARD}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>ID</th><th style={TH}>Member</th><th style={TH}>Requested</th><th style={TH}>Approved</th><th style={TH}>Total Debt</th><th style={TH}>Cycle</th><th style={TH}>Status</th><th style={TH}>Action</th></tr></thead><tbody>{loans.map(l=><tr key={l.id}><td style={{...TD,fontFamily:"monospace",color:c.accent}}>{l.id}</td><td style={TD}>{l.memberName}</td><td style={{...TD,fontFamily:"monospace",color:c.muted,fontSize:"11px"}}>{GHS(l.principalRequested)}</td><td style={{...TD,fontFamily:"monospace"}}>{l.principalApproved?GHS(l.principalApproved):"—"}</td><td style={{...TD,fontFamily:"monospace",color:c.green}}>{l.totalDebt?GHS(l.totalDebt):"—"}</td><td style={TD}>{l.cycle}</td><td style={TD}><span style={pill(l.status)}>{l.status}</span></td><td style={TD}>{l.status==="PENDING"&&<><button onClick={()=>openApprove(l)} style={{background:c.accent,color:"#000",border:"none",borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontWeight:"bold",fontSize:"11px",marginRight:"6px"}}>APPROVE</button><button onClick={()=>openReject(l)} style={{background:c.redSoft,color:c.red,border:`1px solid ${c.red}`,borderRadius:"6px",padding:"5px 10px",cursor:"pointer",fontWeight:"bold",fontSize:"11px"}}>REJECT</button></>}{l.status==="APPROVED"&&<span style={{color:c.muted,fontSize:"11px",fontStyle:"italic"}}>Awaiting Admin disbursement</span>}{(l.status==="ACTIVE"||l.status==="PAID_OFF")&&<span style={{color:c.muted,fontSize:"11px"}}>—</span>}</td></tr>)}</tbody></table></div>
        </>}

        {tab==="members"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"10px"}}>
            <div style={SEC}>Member Register — {members.length} Member{members.length!==1?"s":""}</div>
            <input style={{...INP,width:"240px",fontSize:"12px"}} placeholder="🔍 Search name, phone or ID..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {filteredM.map(m=>{
            const mLoans=loans.filter(l=>l.memberId===m.id);
            const isExp=expMember===m.id;
            return <div key={m.id} style={CARD}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setExpMember(isExp?null:m.id)}>
                <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                  <div style={{width:"40px",height:"40px",borderRadius:"50%",background:c.accentSoft,border:`2px solid ${c.accent}`,display:"flex",alignItems:"center",justifyContent:"center",color:c.accent,fontWeight:"bold",fontSize:"14px",flexShrink:0}}>{m.fullName.charAt(0)}</div>
                  <div><div style={{fontWeight:"bold",color:c.text}}>{m.fullName}</div><div style={{fontSize:"11px",color:c.muted,fontFamily:"monospace"}}>{m.id} · {m.phone} · {m.typeOfBusiness}</div></div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                  {mLoans.map(l=><span key={l.id} style={pill(l.status)}>{l.status}</span>)}
                  <span style={{color:c.muted,fontSize:"12px"}}>{isExp?"▲":"▼"}</span>
                </div>
              </div>
              {isExp&&<div style={{marginTop:"16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px",paddingTop:"16px",borderTop:`1px solid ${c.border}`}}>
                <div>
                  <div style={{fontSize:"11px",color:c.blue,letterSpacing:"1px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"8px"}}>Customer Details</div>
                  {[["Phone",m.phone],["Gender",m.gender],["Marital Status",m.maritalStatus],["DOB",m.dob],["Address",m.residentialAddress],["Home Town",m.homeTown],["Dependents",m.dependents],["Business",m.typeOfBusiness],["Biz Location",m.businessLocation],["Ghana Card",m.ghanaCard],["GPS",m.digitalAddress],["Alt MoMo",m.alternateMomo]].filter(([,v])=>v).map(([label,val])=>(
                    <div key={label} style={{display:"flex",gap:"8px",marginBottom:"4px",fontSize:"12px"}}><span style={{color:c.muted,minWidth:"100px"}}>{label}</span><span style={{color:c.text}}>{val}</span></div>
                  ))}
                </div>
                <div>
                  <div style={{fontSize:"11px",color:c.orange,letterSpacing:"1px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"8px"}}>Guarantor</div>
                  {m.guarantor&&[["Name",m.guarantor.name],["Relationship",m.guarantor.relationship],["Phone",m.guarantor.phone],["Address",m.guarantor.residentialAddress],["Occupation",m.guarantor.occupation]].filter(([,v])=>v).map(([label,val])=>(
                    <div key={label} style={{display:"flex",gap:"8px",marginBottom:"4px",fontSize:"12px"}}><span style={{color:c.muted,minWidth:"90px"}}>{label}</span><span style={{color:c.text}}>{val}</span></div>
                  ))}
                  <div style={{marginTop:"14px",fontSize:"11px",color:c.muted,letterSpacing:"1px",textTransform:"uppercase",fontFamily:"monospace",marginBottom:"8px"}}>Loan History</div>
                  {mLoans.map(l=>(
                    <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${c.border}`,fontSize:"12px",flexWrap:"wrap",gap:"4px"}}>
                      <span style={{fontFamily:"monospace",color:c.accent}}>{l.id}</span>
                      <span>{GHS(l.principalRequested)}</span>
                      <span style={pill(l.status)}>{l.status}</span>
                    </div>
                  ))}
                </div>
              </div>}
            </div>;
          })}
        </>}

      </div>}
      <Footer/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
